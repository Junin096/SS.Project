<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feitiço do Pesadelo - Personagens</title>
    <link rel="stylesheet" href="css/style.css?v=3">
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            padding: 20px;
        }
        .nav-menu { display: flex; gap: 20px; margin-bottom: 40px; justify-content: center; }
        .nav-link { color: #888; text-decoration: none; font-size: 16px; letter-spacing: 2px; transition: all 0.3s; }
        .nav-link:hover { color: #fff; text-shadow: 0 0 8px #fff; }

        /* Container que alinha os cards lado a lado */
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* O Card inteiro agora é um link clicável */
        .character-card {
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid #333;
            border-radius: 4px;
            width: 280px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .character-card:hover {
            border-color: #666;
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.05);
        }

        /* Estilo da foto do personagem */
        .character-img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border: 1px solid #222;
            border-radius: 4px;
            margin-bottom: 15px;
            filter: grayscale(40%) brightness(80%);
            transition: all 0.3s ease;
        }

        .character-card:hover .character-img {
            filter: grayscale(0%) brightness(100%);
            border-color: #555;
        }

        .character-name {
            font-family: serif;
            font-size: 22px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: #fff;
        }

        /* Remove estilos padrão da caixa de feitiço para caber no card */
        .spell-description {
            background: none !important;
            border: none !important;
            padding: 0 !important;
            box-shadow: none !important;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <nav class="nav-menu">
        <a href="index.html" class="nav-link">[ Início ]</a>
        <a href="personagens.html" class="nav-link" style="color: #fff; text-shadow: 0 0 8px #fff;">[ Personagens ]</a>
    </nav>

    <div class="cards-container">
        
        <a href="personagens/sunny.html" class="character-card">
            <img src="img/sunless.jpg" alt="Sunny" class="character-img">
            <div class="character-name">Sunny</div>
            <div class="spell-description" id="desc-sunny">
                <p>Perdido da Luz</p>
                <p>Classe: Terror</p>
            </div>
        </a>

        <a href="personagens/nephis.html" class="character-card">
            <img src="img/nephis.jpg" alt="Nephis" class="character-img">
            <div class="character-name">Nephis</div>
            <div class="spell-description" id="desc-nephis">
                <p>Estrela da Mudança</p>
                <p>Classe: Monstro</p>
            </div>
        </a>

        <a href="personagens/cassie.html" class="character-card">
            <img src="img/cassia.jpg" alt="Cassie" class="character-img">
            <div class="character-name">Cassie</div>
            <div class="spell-description" id="desc-cassie">
                <p>Canção dos Caídos</p>
                <p>Classe: Vidente</p>
            </div>
        </a>

    </div>

    <script src="js/spell.js?v=3"></script>
    <script>
        // Inicializa a tradução rúnica para as descrições de cada card de uma vez só!
        if (typeof initSpellText === 'function') {
            initSpellText('desc-sunny');
            initSpellText('desc-nephis');
            initSpellText('desc-cassie');
        }
    </script>
</body>
</html>
