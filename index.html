<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Runas - Efeito de Queda</title>
    <style>
        body {
            background-color: #050505;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 50px;
            display: flex;
            justify-content: center;
        }

        /* O estilo de seleção nativo modificado para Branco Puro */
        ::selection {
            background-color: #ffffff;
            color: #000000;
            text-shadow: none;
        }

        .description-box {
            background-color: #0a0a0a;
            border: 1px solid #3a3a3a;
            padding: 30px;
            max-width: 600px;
            border-radius: 5px;
            cursor: pointer; /* Indica que é interagível */
            line-height: 1.8;
            font-size: 18px;
            /* Um leve brilho para indicar que pode ser clicado */
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.05);
            transition: box-shadow 0.3s ease;
        }

        .description-box:hover {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        }

        /* O contêiner de cada letra para o efeito funcionar */
        .char-wrapper {
            display: inline-block;
            position: relative;
        }

        /* Estado Rúnico */
        .rune-char {
            display: inline-block;
            color: #888;
            transition: transform 0.6s ease, opacity 0.4s ease;
        }

        /* Estado Real (Traduzido) - Brilho Branco Puro */
        .real-char {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            color: #ffffff;
            text-shadow: 0 0 5px #ffffff, 0 0 15px #ffffff;
            transition: opacity 0.6s ease;
        }

        /* --- CLASSES DE ANIMAÇÃO APLICADAS VIA JAVASCRIPT --- */
        
        /* A runa cai e desaparece */
        .char-wrapper.translated .rune-char {
            transform: translateY(15px);
            opacity: 0;
        }

        /* O texto real aparece brilhando */
        .char-wrapper.translated .real-char {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="description-box" id="spell-text" title="Clique para focar e traduzir as runas">
        </div>

    <script>
        // O texto real que queremos esconder inicialmente
        const secretText = "Atributo Inato: Criança das Sombras. As sombras o reconhecem como um dos seus. Você recebe afinidade com as sombras e resistência a ataques baseados em trevas.";
        const runes = 'ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛋᛏᛒᛖᛗᛚᛜᛟᛞ';
        const textBox = document.getElementById('spell-text');

        // Função para construir o HTML letra por letra
        function buildRunicText(text) {
            let htmlContent = '';
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                
                // Se for espaço, mantemos o espaço normal para não quebrar o layout
                if (char === ' ') {
                    htmlContent += ' ';
                    continue;
                }

                // Gera uma runa aleatória
                const randomRune = runes[Math.floor(Math.random() * runes.length)];
                
                // Cria a estrutura: um wrapper contendo a runa e a letra real escondida
                htmlContent += `
                    <span class="char-wrapper">
                        <span class="rune-char">${randomRune}</span>
                        <span class="real-char">${char}</span>
                    </span>
                `;
            }
            return htmlContent;
        }

        // Injeta o texto processado na tela
        textBox.innerHTML = buildRunicText(secretText);

        // A mágica acontece aqui: O Evento de Clique
        textBox.addEventListener('click', () => {
            const wrappers = document.querySelectorAll('.char-wrapper');
            
            wrappers.forEach((wrapper, index) => {
                // Adicionamos um pequeno atraso matemático (index * 20) 
                // para criar o efeito "em cascata" ou "onda" da tradução
                setTimeout(() => {
                    wrapper.classList.add('translated');
                }, index * 20); // Altere esse "20" para deixar a cascata mais rápida ou mais devagar
            });
        });
    </script>

</body>
</html>
