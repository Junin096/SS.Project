<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feitiço do Pesadelo</title>
    <style>
        /* --- ESTILOS GERAIS --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            cursor: none;
        }

        /* --- MENU --- */
        .nav-menu { display: flex; gap: 20px; margin-bottom: 30px; justify-content: center; }
        .nav-link { color: #888; text-decoration: none; font-size: 16px; letter-spacing: 2px; transition: all 0.3s; }
        .nav-link:hover { color: #fff; text-shadow: 0 0 8px #fff; }

        /* --- CAIXA DO FEITIÇO --- */
        .spell-description {
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid #333;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            line-height: 1.8;
            letter-spacing: 1px;
            position: relative;
        }
        .spell-description p { margin-bottom: 15px; }
        .spell-description p:last-child { margin-bottom: 0; }

        /* --- EFEITO RÚNICO --- */
        .rune-char {
            display: inline-block;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #555;
            transition: all 0.1s ease;
            position: relative;
        }
        .real-char {
            display: inline-block;
            color: #fff;
            text-shadow: 0 0 8px #fff, 0 0 15px #888;
            animation: reveal 0.4s ease forwards;
        }
        @keyframes reveal {
            0% { opacity: 0; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* --- PARTÍCULAS E POEIRA --- */
        .char-dust {
            position: fixed;
            pointer-events: none;
            width: 2px;
            height: 2px;
            background: #fff;
            box-shadow: 0 0 4px #fff, 0 0 8px #aaa;
            border-radius: 50%;
            z-index: 1000;
        }
        .mouse-trail {
            position: fixed;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 8px #fff;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            transition: width 0.2s, height 0.2s;
        }
        .mouse-dust {
            position: fixed;
            pointer-events: none;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 4px #fff;
            border-radius: 50%;
            z-index: 9998;
        }
    </style>
</head>
<body>

    <div class="mouse-trail" id="mouseTrail"></div>

    <div style="max-width: 700px; width: 100%;">
        <nav class="nav-menu">
            <a href="index.html" class="nav-link" style="color: #fff;">[ Início ]</a>
            <a href="personagens.html" class="nav-link">[ Personagens ]</a>
        </nav>

        <div class="spell-description" id="intro-text">
            <p>[O Feitiço do Pesadelo chama por você.]</p>
            <p>Aspirações grandiosas trazem provações terríveis. Você foi escolhido para carregar o fardo dos esquecidos.</p>
            <p>Apenas aqueles que desafiarem a escuridão terão seus nomes gravados no Registro de Alma.</p>
        </div>
    </div>

    <script>
        /* --- LOGICA DO FEITIÇO (MIGRAÇÃO DO SPELL.JS) --- */
        const runes = "ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᚨᛇᛈᛉᛊᛏᛒᛗᛚᛍᛏᛖᛗᛚᛞᛟ";
        
        function initSpellText(elementId) {
            const container = document.getElementById(elementId);
            if (!container) return;
            
            const paragraphs = container.querySelectorAll('p');
            
            paragraphs.forEach(p => {
                const originalText = p.innerText;
                p.innerHTML = '';
                
                for (let char of originalText) {
                    const span = document.createElement('span');
                    if (char === ' ' || char === '\n' || char === '[' || char === ']') {
                        span.innerText = char;
                        span.style.whiteSpace = 'pre-wrap';
                    } else {
                        span.classList.add('rune-char');
                        span.dataset.real = char;
                        span.innerText = runes[Math.floor(Math.random() * runes.length)];
                        
                        // Evento de quebra ao passar o mouse
                        span.addEventListener('mouseover', function handleReveal() {
                            if (!span.classList.contains('real-char')) {
                                createDust(span);
                                span.classList.remove('rune-char');
                                span.classList.add('real-char');
                                span.innerText = span.dataset.real;
                                span.removeEventListener('mouseover', handleReveal);
                            }
                        });
                    }
                    p.appendChild(span);
                }
            });
            
            // Loop de mutação das runas sobreviventes
            setInterval(() => {
                const activeRunes = container.querySelectorAll('.rune-char');
                activeRunes.forEach(rune => {
                    if (Math.random() > 0.85) {
                        rune.innerText = runes[Math.floor(Math.random() * runes.length)];
                    }
                });
            }, 120);
        }

        // Partículas ao quebrar runas
        function createDust(element) {
            const rect = element.getBoundingClientRect();
            for (let i = 0; i < 6; i++) {
                const dust = document.createElement('div');
                dust.classList.add('char-dust');
                dust.style.left = (rect.left + rect.width / 2) + 'px';
                dust.style.top = (rect.top + rect.height / 2) + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                
                document.body.appendChild(dust);
                
                let opacity = 1;
                const pInfo = { x: rect.left, y: rect.top, vx, vy };
                
                const anim = setInterval(() => {
                    pInfo.x += pInfo.vx;
                    pInfo.y += pInfo.vy;
                    pInfo.vy += 0.05; // gravidade
                    dust.style.left = pInfo.x + 'px';
                    dust.style.top = pInfo.y + 'px';
                    opacity -= 0.04;
                    dust.style.opacity = opacity;
                    
                    if (opacity <= 0) {
                        clearInterval(anim);
                        dust.remove();
                    }
                }, 20);
            }
        }

        /* --- LOGICA DO MOUSE --- */
        const trail = document.getElementById('mouseTrail');
        let lastX = 0, lastY = 0;

        document.addEventListener('mousemove', (e) => {
            trail.style.left = e.clientX + 'px';
            trail.style.top = e.clientY + 'px';
            
            // Criar rastro de poeira se mover rápido
            const dist = Math.hypot(e.clientX - lastX, e.clientY - lastY);
            if (dist > 15 && Math.random() > 0.4) {
                const mDust = document.createElement('div');
                mDust.classList.add('mouse-dust');
                mDust.style.left = e.clientX + 'px';
                mDust.style.top = e.clientY + 'px';
                document.body.appendChild(mDust);
                
                let op = 1;
                const anim = setInterval(() => {
                    op -= 0.05;
                    mDust.style.opacity = op;
                    if (op <= 0) { clearInterval(anim); mDust.remove(); }
                }, 30);
                
                lastX = e.clientX;
                lastY = e.clientY;
            }
        });

        // Inicializa o efeito no texto
        initSpellText('intro-text');
    </script>
</body>
</html>
