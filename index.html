<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feitiço do Pesadelo - Shadow Slave</title>
    <style>
        body {
            background-color: #050505;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            /* Remove a barra de rolagem horizontal se as partículas passarem da tela */
            overflow-x: hidden; 
        }

        ::selection {
            background-color: #ffffff;
            color: #000000;
            text-shadow: none;
        }

        .spell-frame {
            background-color: #0a0a0a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 0 20px rgba(180, 180, 180, 0.05), inset 0 0 20px rgba(180, 180, 180, 0.05);
            position: relative;
            z-index: 10; /* Garante que o texto fique acima do rastro do mouse */
        }

        .runic-text {
            color: #f0f0f0;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .runes-decor {
            text-align: center;
            font-size: 24px;
            color: #555;
            margin-bottom: 10px;
            letter-spacing: 10px;
        }

        hr {
            border: 0;
            height: 1px;
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(200, 200, 200, 0.3), rgba(0, 0, 0, 0));
            margin: 30px 0;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        nav a {
            color: #888;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            min-width: 150px; 
            text-align: center;
            display: inline-block;
        }

        nav a:hover {
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }

        .spell-description {
            position: relative;
            line-height: 1.8;
            font-size: 16px;
            text-align: justify;
            padding: 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.4s ease;
        }

        .spell-description:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .char-wrapper {
            display: inline-block;
            position: relative;
        }

        .rune-char {
            display: inline-block;
            color: #555;
            transition: transform 0.6s ease, opacity 0.4s ease;
        }

        .real-char {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            color: #ffffff;
            text-shadow: 0 0 5px #ffffff, 0 0 12px rgba(255, 255, 255, 0.8);
            transition: opacity 0.6s ease;
        }

        .char-wrapper.translated .rune-char {
            transform: translateY(10px);
            opacity: 0;
        }

        .char-wrapper.translated .real-char {
            opacity: 1;
        }

        /* --- NOVOS ESTILOS: Efeitos do Mouse --- */
        
        /* Rastro de luz prateada */
        .mouse-trail {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #e0e0e0;
            box-shadow: 0 0 10px #c0c0c0, 0 0 20px #ffffff;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: fadeTrail 0.4s ease-out forwards;
            z-index: 9999;
        }
        
        /* Poeira mágica (fagulhas) */
        .mouse-dust {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #ffffff;
            box-shadow: 0 0 6px #ffffff;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: floatDust 0.8s ease-out forwards;
            z-index: 9998;
        }

        @keyframes fadeTrail {
            0% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.1); }
        }

        @keyframes floatDust {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0); }
        }
    </style>
</head>
<body>

    <div class="spell-frame">
        <div class="runes-decor">ᛋᚼᚨᛏᛟᚹ ᛋᛚᚨᚡᛖ</div>
        <h1 class="runic-text">[O Feitiço do Pesadelo]</h1>
        
        <nav>
            <a href="#" data-value="[ Atributos ]">[ Atributos ]</a>
            <a href="#" data-value="[ Memórias ]">[ Memórias ]</a>
            <a href="#" data-value="[ Ecos ]">[ Ecos ]</a>
        </nav>

        <hr>

        <div class="spell-description" id="main-desc"></div>
    </div>

    <script>
        // --- CÓDIGO DO MENU (NAV) ---
        const runesSet = 'ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛋᛏᛒᛖᛗᛚᛜᛟᛞ';
        const menuLinks = document.querySelectorAll('nav a');

        function getRandomRunes(text) {
            return text.split('').map(char => {
                if (char === '[' || char === ']' || char === ' ') return char;
                return runesSet[Math.floor(Math.random() * runesSet.length)];
            }).join('');
        }

        menuLinks.forEach(link => {
            const originalText = link.dataset.value;
            link.innerText = getRandomRunes(originalText);
            let interval = null;

            link.addEventListener('mouseenter', () => {
                let iteration = 0;
                clearInterval(interval);
                interval = setInterval(() => {
                    link.innerText = originalText.split('').map((letter, index) => {
                        if(index < iteration) return originalText[index];
                        if (letter === '[' || letter === ']' || letter === ' ') return letter;
                        return runesSet[Math.floor(Math.random() * runesSet.length)];
                    }).join('');
                    if(iteration >= originalText.length) clearInterval(interval);
                    iteration += 0.5; 
                }, 30);
            });

            link.addEventListener('mouseleave', () => {
                clearInterval(interval);
                link.innerText = getRandomRunes(originalText);
            });
        });

        // --- CÓDIGO DA DESCRIÇÃO (TRADUÇÃO E REVERSÃO) ---
        const descBox = document.getElementById('main-desc');
        const paragraphs = [
            "Você foi infectado pelo Feitiço do Pesadelo.",
            "As runas se contorcem na escuridão antes de se traduzirem em uma linguagem que sua mente consegue compreender. Este é um registro daqueles que trilham o caminho da Ascensão em um mundo em ruínas.",
            "Concentre-se nestes escritos para visualizar os registros das almas atreladas ao destino."
        ];

        function buildRunicParagraphs(textArray) {
            let htmlContent = '';
            textArray.forEach(text => {
                htmlContent += '<p>';
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    if (char === ' ') {
                        htmlContent += ' ';
                        continue;
                    }
                    const randomRune = runesSet[Math.floor(Math.random() * runesSet.length)];
                    htmlContent += `
                        <span class="char-wrapper">
                            <span class="rune-char">${randomRune}</span>
                            <span class="real-char">${char}</span>
                        </span>`;
                }
                htmlContent += '</p>';
            });
            return htmlContent;
        }

        descBox.innerHTML = buildRunicParagraphs(paragraphs);
        const wrappers = document.querySelectorAll('.char-wrapper');
        let isHovered = false;

        descBox.addEventListener('mouseenter', () => {
            isHovered = true;
            wrappers.forEach((wrapper, index) => {
                setTimeout(() => {
                    if(isHovered) {
                        wrapper.classList.add('translated');
                    }
                }, index * 10);
            });
        });

        descBox.addEventListener('mouseleave', () => {
            isHovered = false;
            const total = wrappers.length;
            wrappers.forEach((wrapper, index) => {
                setTimeout(() => {
                    if(!isHovered) {
                        wrapper.classList.remove('translated');
                    }
                }, (total - index) * 15);
            });
        });

        // --- NOVO CÓDIGO: RASTRO MÁGICO DO MOUSE ---
        window.addEventListener('mousemove', (e) => {
            // 1. Rastro Prateado Principal
            const trail = document.createElement('div');
            trail.className = 'mouse-trail';
            trail.style.left = e.pageX + 'px';
            trail.style.top = e.pageY + 'px';
            document.body.appendChild(trail);
            
            setTimeout(() => {
                trail.remove();
            }, 400); // Tempo de vida do rastro

            // 2. Poeira Mágica (gerada aleatoriamente enquanto move)
            if (Math.random() > 0.4) { // 60% de chance de gerar poeira a cada movimento
                const dust = document.createElement('div');
                dust.className = 'mouse-dust';
                dust.style.left = e.pageX + 'px';
                dust.style.top = e.pageY + 'px';
                
                // Direção aleatória para a poeira flutuar
                const tx = (Math.random() - 0.5) * 80; // espalha no eixo X
                const ty = (Math.random() - 0.5) * 80; // espalha no eixo Y
                dust.style.setProperty('--tx', `${tx}px`);
                dust.style.setProperty('--ty', `${ty}px`);
                
                document.body.appendChild(dust);
                
                setTimeout(() => {
                    dust.remove();
                }, 800); // Tempo de vida da poeira
            }
        });
    </script>

</body>
</html>
