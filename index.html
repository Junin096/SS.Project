<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Slave Wiki</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page-shell" aria-labelledby="page-title">
        <section class="hero-card">
            <p class="eyebrow">Shadow Slave Wiki</p>
            <h1 id="page-title">Feitiço do Pesadelo</h1>
            <p class="intro">
                Clique no texto abaixo para revelar a mensagem escondida entre as runas.
            </p>

            <div class="spell-description" id="main-desc" role="button" tabindex="0" aria-label="Revelar texto do Feitiço do Pesadelo">
                <p>Você foi infectado pelo Feitiço do Pesadelo.</p>
                <p>As runas se contorcem e se dissipam como poeira ao vento, revelando a linguagem proibida do destino.</p>
            </div>
        </section>
    </main>

    <script src="spell.js" defer></script>
</body>
</html>
