<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Feitiço do Pesadelo - Ajustes</title>
    <style>
        /* Estilos base mantidos para a estética */
        body { background-color: #050505; color: #d4d4d4; font-family: 'Courier New', monospace; padding: 50px; }
        
        .spell-description {
            line-height: 2.2; /* Espaçamento melhorado */
            font-size: 18px;
            cursor: pointer;
            padding: 40px;
            border: 1px solid #222;
            max-width: 700px;
        }

        .char-wrapper { position: relative; display: inline-block; margin: 0 1px; }

        .rune-char { color: #666; transition: all 0.5s ease; }
        .real-char { 
            position: absolute; left: 0; top: 0; opacity: 0; 
            color: #fff; text-shadow: 0 0 8px #fff; 
            transition: all 0.5s ease;
        }

        .translated .rune-char { transform: translateY(10px); opacity: 0; }
        .translated .real-char { opacity: 1; }

        /* Partícula de letra */
        .char-dust {
            position: absolute; width: 2px; height: 2px; background: #fff;
            border-radius: 50%; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="spell-description" id="desc-box">
        <p>Você foi infectado pelo Feitiço do Pesadelo.</p>
        <p>As runas se contorcem na escuridão antes de se traduzirem em uma linguagem que sua mente consegue compreender. Este é um registro daqueles que trilham o caminho da Ascensão.</p>
    </div>

    <script>
        const runesSet = 'ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛋᛏᛒᛖᛗᛚᛜᛟᛞ';
        const box = document.getElementById('desc-box');

        // Inicializa o texto
        function initText() {
            const paragraphs = box.querySelectorAll('p');
            paragraphs.forEach(p => {
                const text = p.innerText;
                p.innerHTML = '';
                text.split('').forEach(char => {
                    const span = document.createElement('span');
                    span.className = 'char-wrapper';
                    span.innerHTML = `<span class="rune-char">${runesSet[Math.floor(Math.random()*runesSet.length)]}</span><span class="real-char">${char}</span>`;
                    p.appendChild(span);
                });
            });
        }

        initText();

        // Lógica de Tradução
        box.addEventListener('click', () => {
            const allChars = box.querySelectorAll('.char-wrapper');
            allChars.forEach((el, index) => {
                setTimeout(() => {
                    el.classList.add('translated');
                    spawnDust(el, true); // true = escala maior (clique)
                }, index * 10);
            });
        });

        // Efeito de poeira (menor nas letras, maior no clique)
        function spawnDust(el, big) {
            const dust = document.createElement('div');
            dust.className = 'char-dust';
            const rect = el.getBoundingClientRect();
            dust.style.left = rect.left + 'px';
            dust.style.top = rect.top + 'px';
            dust.style.width = big ? '4px' : '2px';
            dust.style.height = big ? '4px' : '2px';
            document.body.appendChild(dust);
            
            // Animação simples de dissipar
            dust.animate([
                { transform: 'translateY(0) scale(1)', opacity: 1 },
                { transform: 'translateY(-20px) scale(0)', opacity: 0 }
            ], { duration: 800 });
            
            setTimeout(() => dust.remove(), 800);
        }
    </script>
</body>
</html>
