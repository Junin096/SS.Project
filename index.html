<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arquivo do Feitiço do Pesadelo</title>
    <style>
        body {
            background-color: #050608;
            color: #d1d5db;
            font-family: serif;
            margin: 0;
            padding: 5vh 20px;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
            text-align: center;
            margin-bottom: 20px;
        }

        .global-translate-btn {
            background: #11141a;
            border: 1px solid #2d333f;
            padding: 12px 25px;
            border-radius: 4px;
            color: #8a95a5;
            font-family: monospace;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 40px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 50;
            position: relative;
        }
        .global-translate-btn:hover {
            border-color: #cbd5e1;
            color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .character-grid {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1000px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .char-card {
            background: #0f1115;
            border: 1px solid #1f242e;
            border-radius: 6px;
            padding: 20px;
            width: 220px;
            text-align: center;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .char-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-color: #3a4354;
        }

        .char-img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 4px;
            filter: grayscale(40%) brightness(70%);
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .char-card:hover .char-img {
            filter: grayscale(0%) brightness(100%);
        }

        .char-name {
            font-size: 22px;
            margin: 0;
            color: #4f5b73;
            letter-spacing: 2px;
        }
        .rune-letter {
            display: inline-block;
            transition: all 0.3s;
        }
        .rune-letter.revealed {
            color: #fff;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }

        .magic-wave {
            position: fixed;
            top: -20vh;
            left: 0;
            width: 100vw;
            height: 10vh;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.3), transparent);
            box-shadow: 0 0 40px rgba(255,255,255,0.1);
            pointer-events: none;
            z-index: 100;
            opacity: 0;
        }
        @keyframes waveSweep {
            0% { top: -20vh; opacity: 1; }
            100% { top: 120vh; opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>ARQUIVOS DO FEITIÇO</h1>

    <button class="global-translate-btn" id="mass-btn">
        Desvendar Todos os Registros
    </button>

    <div class="magic-wave" id="wave"></div>

    <div class="character-grid">
        <a href="personagens/sunny.html" class="char-card">
            <img src="imagens/Sunny.jpg" alt="Sunny" class="char-img">
            <h2 class="char-name" data-name="SUNLESS"></h2>
        </a>

        <a href="personagens/nephis.html" class="char-card">
            <img src="imagens/Nephis.jpg" alt="Nephis" class="char-img">
            <h2 class="char-name" data-name="NEPHIS"></h2>
        </a>

        <a href="personagens/cassie.html" class="char-card">
            <img src="imagens/Cassie.jpg" alt="Cassie" class="char-img">
            <h2 class="char-name" data-name="CASSIE"></h2>
        </a>
    </div>

    <script>
        const runes = ['ᚦ', 'ᚧ', 'ᚨ', 'ᛒ', 'ᛃ', 'ᛄ', 'ᛅ', 'ᛆ', 'ᛇ'];
        
        document.querySelectorAll('.char-name').forEach(el => {
            const realName = el.getAttribute('data-name');
            for (let i = 0; i < realName.length; i++) {
                const span = document.createElement('span');
                span.classList.add('rune-letter');
                span.dataset.real = realName[i];
                span.textContent = realName[i] === ' ' ? ' ' : runes[Math.floor(Math.random() * runes.length)];
                el.appendChild(span);
            }
        });

        document.querySelectorAll('.char-card').forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.querySelectorAll('.rune-letter').forEach((l, idx) => {
                    setTimeout(() => {
                        if (!l.classList.contains('revealed')) {
                            l.textContent = l.dataset.real;
                            l.classList.add('revealed');
                        }
                    }, idx * 50);
                });
            });
        });

        document.getElementById('mass-btn').addEventListener('click', () => {
            const wave = document.getElementById('wave');
            wave.style.animation = 'waveSweep 1.5s ease-in-out forwards';
            
            setTimeout(() => {
                document.querySelectorAll('.rune-letter').forEach(l => {
                    l.textContent = l.dataset.real;
                    l.classList.add('revealed');
                });
            }, 600);

            setTimeout(() => { wave.style.animation = 'none'; }, 1600);
        });
    </script>
</body>
</html>
