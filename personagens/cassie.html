<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alma - Cassie</title>
    <link rel="stylesheet" href="../css/style.css?v=2">
    <style>
        body { background-color: #030608 !important; } /* Tom levemente azulado/névoa */
        .character-container {
            display: flex;
            gap: 25px;
            background: rgba(8, 11, 14, 0.95);
            border: 1px solid #15222e;
            padding: 25px;
            border-radius: 4px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.9);
            align-items: center;
        }
        .character-img {
            width: 180px;
            height: 240px;
            object-fit: cover;
            border: 1px solid #22374a;
            border-radius: 2px;
            filter: grayscale(50%) brightness(75%);
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
            transition: all 0.5s ease;
        }
        .character-img:hover {
            filter: grayscale(0%) brightness(95%);
            border-color: #447799;
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.15);
        }
        .spell-description { background: none !important; border: none !important; padding: 0 !important; box-shadow: none !important; }
        .rune-char { color: #1a2836 !important; } /* Runas cor de névoa escura */
        .real-char { color: #cbdcf0 !important; text-shadow: 0 0 8px #479 !important; }
    </style>
</head>
<body>

    <div style="max-width: 750px; width: 100%; margin: 0 auto; padding-top: 10vh;">
        <nav class="nav-menu" style="display: flex; gap: 20px; margin-bottom: 30px; justify-content: flex-start;">
            <a href="../index.html" class="nav-link" style="color: #888; text-decoration: none; font-family: monospace;">[ Início ]</a>
            <a href="../personagens.html" class="nav-link" style="color: #888; text-decoration: none; font-family: monospace;">[ Personagens ]</a>
            <a href="#" class="nav-link" style="color: #fff; text-decoration: none; font-family: monospace;">[ Cassie ]</a>
        </nav>

        <h1 style="color: #22374a; font-family: serif; letter-spacing: 5px; margin-bottom: 20px; text-shadow: 0 0 10px #000;">REGISTRO DE ALMA</h1>

        <div class="character-container">
            <img src="../img/Cassia.jpg" alt="Cassie" class="character-img">
            
            <div class="spell-description" id="cassie-text">
                <p>Nome Verdadeiro: Canção dos Caídos</p>
                <p>Nome: Cassie</p>
                <p>Rank: Adormecida</p>
                <p>Classe: Humana / Vidente</p>
                <p>Atributos: [Revelação do Destino], [Olhos do Passado]</p>
            </div>
        </div>
    </div>

    <script src="../js/spell.js?v=2"></script>
    <script>
        if (typeof initSpellText === 'function') { initSpellText('cassie-text'); }
    </script>
</body>
</html>
