<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alma - Cassie</title>
    <link rel="stylesheet" href="../css/style.css?v=8">
    
    <style>
        body { background-color: #020509 !important; overflow-x: hidden; margin: 0; padding: 0; }

        .mass-translate-container { display: flex; justify-content: center; margin-bottom: 25px; }
        .mass-translate-btn {
            background: #091424; border: 1px solid #1a3a66; padding: 10px 20px; border-radius: 4px;
            color: #527bb0; font-family: monospace; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }
        .mass-translate-btn:hover { border-color: #00aaff; color: #fff; }

        .character-container {
            display: flex; gap: 25px; background: rgba(3, 8, 16, 0.98);
            border: 1px solid #0b1d3a; padding: 25px; border-radius: 4px; align-items: center;
            position: relative;
        }

        .cassie-letter { display: inline-block; font-family: serif; color: transparent; text-shadow: 0 0 8px rgba(0, 170, 255, 0.6); transition: all 0.4s; }
        .cassie-letter.revealed { color: #ffe7a3 !important; text-shadow: 0 0 6px #ffd700 !important; }

        #fate-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
    </style>
</head>
<body>

    <div class="content-wrapper" style="max-width: 750px; margin: 0 auto; padding: 5vh 20px;">
        <div class="mass-translate-container">
            <button class="mass-translate-btn" id="mass-btn">
                <img src="../imagens/translate-icon.png" alt="🔮" style="width:18px;" class="mass-translate-icon">
                Romper Fios do Destino
            </button>
        </div>

        <div class="character-container">
            <canvas id="fate-canvas"></canvas>
            <img src="../imagens/Cassie.jpg" alt="Cassie" style="width:180px;" class="character-img">
            
            <div class="cassie-rune-text" id="cassie-soul-core">
                <p>Nome Verdadeiro: Canção dos Caídos</p>
                <p>Nome: Cassie</p>
                <p>Rank: Adormecida</p>
                <p>Classe: Humana / Vidente</p>
                <p>Atributos: [Revelação do Destino], [Olhos do Passado], [Visão Compulsiva]</p>
            </div>
        </div>
    </div>

    <script>
        const runes = ['ᛈ', 'ᛉ', 'ᛊ', 'ᛋ', 'ᛏ', 'ᛐ', 'ᛑ'];
        const container = document.getElementById('cassie-soul-core');
        const paragraphs = container.querySelectorAll('p');

        paragraphs.forEach(p => {
            const originalText = p.textContent; p.textContent = '';
            for (let i = 0; i < originalText.length; i++) {
                const span = document.createElement('span'); 
                span.classList.add('cassie-letter');
                span.dataset.real = originalText[i];
                span.textContent = originalText[i] === ' ' ? ' ' : runes[Math.floor(Math.random() * runes.length)];
                p.appendChild(span);
            }
        });

        const fCanvas = document.getElementById('fate-canvas');
        const fCtx = fCanvas.getContext('2d');
        function resFate() { fCanvas.width = fCanvas.parentElement.offsetWidth; fCanvas.height = fCanvas.parentElement.offsetHeight; }
        window.addEventListener('resize', resFate); resFate();

        document.getElementById('mass-btn').addEventListener('click', () => {
            resFate();
            let threads = [];
            // Cria teia de fios dourados complexa cruzando o card
            for(let i=0; i<15; i++) {
                threads.push({
                    sx: Math.random() * fCanvas.width, sy: 0,
                    ex: Math.random() * fCanvas.width, ey: fCanvas.height,
                    splitProgress: 0
                });
            }

            function animateThreads() {
                fCtx.clearRect(0, 0, fCanvas.width, fCanvas.height);
                fCtx.strokeStyle = "#ffd700";
                fCtx.shadowColor = "#ffd700";
                fCtx.lineWidth = 1.5;

                let active = false;
                threads.forEach(t => {
                    fCtx.shadowBlur = 8;
                    const midX = (t.sx + t.ex) / 2;
                    const midY = (t.sy + t.ey) / 2;

                    if (t.splitProgress < 1) {
                        active = true;
                        t.splitProgress += 0.08;
                        
                        // Desenha as duas metades se separando/rompendo em direção aos nós originais
                        fCtx.beginPath();
                        fCtx.moveTo(t.sx, t.sy);
                        fCtx.lineTo(t.sx + (midX - t.sx) * (1 - t.splitProgress), t.sy + (midY - t.sy) * (1 - t.splitProgress));
                        fCtx.stroke();

                        fCtx.beginPath();
                        fCtx.moveTo(t.ex, t.ey);
                        fCtx.lineTo(t.ex + (midX - t.ex) * (1 - t.splitProgress), t.ey + (midY - t.ey) * (1 - t.splitProgress));
                        fCtx.stroke();
                    }
                });

                // Revela as letras sincronizado com o romper das amarras
                container.querySelectorAll('.cassie-letter').forEach(l => {
                    l.textContent = l.dataset.real;
                    l.classList.add('revealed');
                });

                if (active) requestAnimationFrame(animateThreads);
                else fCtx.clearRect(0, 0, fCanvas.width, fCanvas.height);
            }
            animateThreads();
        });
    </script>
</body>
</html>
