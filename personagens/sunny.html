<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alma - Lorde das Sombras</title>
    <style>
        body { 
            background-color: #020304 !important; 
            overflow-x: hidden;
            position: relative;
            margin: 0; padding: 0;
            min-height: 100vh;
        }

        /* --- BOTÃO DE INVOCAÇÃO --- */
        .mass-translate-container { display: flex; justify-content: center; margin-bottom: 25px; margin-top: 20px; z-index: 30; position: relative; }
        .mass-translate-btn {
            background: #050608; border: 1px solid #141923; padding: 12px 24px; border-radius: 4px;
            color: #4f5b73; font-family: monospace; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.8); 
        }
        .mass-translate-btn:hover { border-color: #707c91; color: #ffffff; text-shadow: 0 0 8px #fff; }

        /* --- ELEMENTOS DE AMBIENTAÇÃO --- */
        .essence-thread { position: fixed; width: 200px; height: 200px; pointer-events: none; z-index: 20; opacity: 0.1; animation: threadPulse 5s infinite ease-in-out; }
        .thread-tl { top: 0; left: 0; border-left: 2px solid #141923; border-top: 2px solid #141923; }
        .thread-br { bottom: 0; right: 0; border-right: 2px solid #141923; border-bottom: 2px solid #141923; }
        @keyframes threadPulse { 0%, 100% { transform: scale(1); opacity: 0.1; } 50% { transform: scale(1.05); opacity: 0.25; } }

        .content-wrapper { position: relative; z-index: 20; max-width: 750px; width: 100%; margin: 0 auto; padding: 5vh 20px 40px 20px; box-sizing: border-box; }
        
        /* --- CAIXA PRINCIPAL PROMINENTE --- */
        .character-container { 
            display: flex; gap: 25px; 
            background: #07090d; /* Mais escuro e sólido para destacar do fundo */
            border: 2px solid #161c26; /* Borda mais grossa e proeminente */
            padding: 30px; 
            border-radius: 4px; 
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.95), 0 0 30px rgba(0, 0, 0, 0.6); 
            align-items: center; position: relative; 
            transition: opacity 0.1s, transform 0.1s;
            z-index: 25;
        }
        @media (max-width: 600px) { .character-container { flex-direction: column; text-align: center; } }
        
        .character-img { width: 180px; height: 240px; object-fit: cover; border: 1px solid #141923; border-radius: 2px; filter: grayscale(80%) brightness(50%); }

        /* --- ANIMAÇÕES DE IMPACTO --- */
        .shake-cracking { animation: violentGrip 0.12s infinite; border-color: #3a1414 !important; box-shadow: 0 0 50px rgba(0,0,0,1) !important; }
        @keyframes violentGrip {
            0% { transform: translate(1px, 2px) rotate(0deg) scale(1); }
            50% { transform: translate(-2px, -1px) rotate(-0.5deg) scale(0.99); }
            100% { transform: translate(2px, -1px) rotate(0.5deg) scale(1.01); }
        }
        .shatter-hidden { opacity: 0 !important; pointer-events: none; transform: scale(0.7); }

        /* --- ESCURIDÃO ABSOLUTA --- */
        .absolute-darkness {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000; z-index: 200; opacity: 0; pointer-events: none;
            transition: opacity 1s ease-in-out;
        }

        /* --- TEXTOS E AS SOMBRAS ROLANTES --- */
        .sunny-rune-text p { margin: 12px 0; font-family: monospace; font-size: 16px; min-height: 20px; color: #2d3545; }
        
        /* Estado não traduzido: Sombrio e misterioso */
        .sunny-letter { display: inline-block; font-family: serif; color: #1c222e; text-shadow: 0 0 3px rgba(0,0,0,0.8); transition: all 0.2s; }
        .sunny-letter.spell-attempt { color: #000 !important; transform: scale(0.8); }
        .sunny-letter.weaving-essence { color: #000 !important; text-shadow: 0 0 10px #000 !important; transform: scale(1.3); }
        
        /* Traduzido: Aspecto denso de abismo com sombras rastejantes sob o texto */
        .sunny-letter.revealed { 
            color: #3b4659 !important; 
            font-weight: bold;
            text-shadow: 0 2px 5px #000000;
            animation: rollingShadow 4.5s infinite ease-in-out;
        }
        @keyframes rollingShadow {
            0%, 100% { color: #30394a !important; text-shadow: 0 3px 6px #000, 0 0 5px rgba(0,0,0,0.9); }
            50% { color: #53627d !important; text-shadow: 0 -2px 10px #000, 0 0 15px rgba(0,0,0,1); transform: translateY(-0.5px); }
        }

        .shadow-strand { position: fixed; pointer-events: none; z-index: 100; border-radius: 50%; background: #000; box-shadow: 0 0 5px #000; }
        
        /* Telas de desenho */
        #ambient-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 5; }
        #action-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 150; }

        .back-btn-container { display: flex; justify-content: center; margin-top: 40px; z-index: 20; position: relative; }
        .back-btn { background: transparent; border: 1px solid #141923; padding: 10px 30px; border-radius: 4px; color: #4f5b73; font-family: monospace; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; }
        .back-btn:hover { background: #050608; border-color: #5c6982; color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="absolute-darkness" id="void"></div>

    <div class="essence-thread thread-tl"></div>
    <div class="essence-thread thread-br"></div>
    
    <canvas id="ambient-canvas"></canvas>
    <canvas id="action-canvas"></canvas> <div class="content-wrapper">
        <div class="mass-translate-container">
            <button class="mass-translate-btn" id="mass-btn">
                Manifestar Tentáculos de Sombra
            </button>
        </div>

        <div class="character-container" id="char-box">
            <img src="../img/lossunny.jpg" alt="Sunless" class="character-img">
            
            <div class="sunny-rune-text" id="sunny-soul-core">
                <p>Nome Verdadeiro: Perdido da Luz</p>
                <p>Nome: Sunless</p>
                <p>Rank: Soberano</p>
                <p>Classe: Divina</p>
                <p>Atributos: [Lorde das Sombras], [Mestre das Sombras], [Encarnação das Trevas]</p>
            </div>
        </div>

        <div class="back-btn-container">
            <a href="../index.html" class="back-btn">← Retornar à Base</a>
        </div>
    </div>

    <script>
        // --- 1. O MAR DA ALMA E OS 7 SÓIS NEGROS ---
        const canvas = document.getElementById('ambient-canvas'); const ctx = canvas.getContext('2d');
        let particles = []; 
        function resCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resCanvas); resCanvas();

        class P { constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.size = Math.random()*1.5; this.speedY = -0.15; } update() { this.y += this.speedY; if(this.y<0) this.y=canvas.height; } draw() { ctx.fillStyle = "rgba(45,53,69,0.2)"; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); } }
        for(let i=0;i<30;i++) particles.push(new P());

        const suns = [
            {x: 0.15, y: 0.22, r: 26}, {x: 0.28, y: 0.15, r: 32}, {x: 0.42, y: 0.25, r: 22},
            {x: 0.50, y: 0.11, r: 42}, // Sol Supremo Dominante
            {x: 0.58, y: 0.25, r: 22}, {x: 0.72, y: 0.15, r: 32}, {x: 0.85, y: 0.22, r: 26}
        ];

        let waveOffset = 0;
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            
            // Desenhar os 7 Sóis Negros
            suns.forEach(s => {
                let sX = s.x * canvas.width; let sY = s.y * canvas.height;
                ctx.beginPath(); ctx.arc(sX, sY, s.r, 0, Math.PI * 2); ctx.fillStyle = "#000000";
                ctx.shadowColor = "rgba(255, 255, 255, 0.18)"; ctx.shadowBlur = 10; ctx.fill();
                ctx.shadowBlur = 0; ctx.strokeStyle = "rgba(200, 210, 230, 0.6)"; ctx.lineWidth = 1.2; ctx.stroke();
            });

            // O Mar de Água Preta
            waveOffset += 0.01;
            const waveLayers = [
                { y: canvas.height * 0.72, freq: 0.004, amp: 14, speed: 1, stroke: "#0f131c" },
                { y: canvas.height * 0.78, freq: 0.006, amp: 10, speed: -1.2, stroke: "#0b0d14" },
                { y: canvas.height * 0.85, freq: 0.003, amp: 18, speed: 0.7, stroke: "#131824" }
            ];

            waveLayers.forEach(layer => {
                ctx.beginPath(); ctx.moveTo(0, canvas.height);
                for (let x = 0; x <= canvas.width; x += 20) {
                    let y = layer.y + Math.sin(x * layer.freq + waveOffset * layer.speed) * layer.amp;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(canvas.width, canvas.height); ctx.closePath();
                ctx.fillStyle = "#000000"; ctx.fill();
                ctx.strokeStyle = layer.stroke; ctx.lineWidth = 2; ctx.stroke();
            });

            particles.forEach(p=>{p.update();p.draw();});
            requestAnimationFrame(anim);
        } anim();

        // --- 2. DECODIFICAÇÃO DE RUNAS MANUAL (HOVER) ---
        const runes = ['ᚦ', 'ᚧ', 'ᚨ', 'ᛒ', 'ᛃ', 'ᛄ', 'ᛅ', 'ᛆ', 'ᛇ'];
        const container = document.getElementById('sunny-soul-core');
        container.querySelectorAll('p').forEach(p => {
            const txt = p.textContent; p.textContent = '';
            for (let i = 0; i < txt.length; i++) {
                const span = document.createElement('span'); span.classList.add('sunny-letter');
                span.dataset.real = txt[i]; span.textContent = txt[i] === ' ' ? ' ' : runes[Math.floor(Math.random() * runes.length)];
                p.appendChild(span);
            }
        });

        function spawnStrands(x,y){
            for(let i=0; i<3; i++){
                const s = document.createElement('div'); s.classList.add('shadow-strand');
                s.style.width='3px'; s.style.height='3px'; s.style.left=x+'px'; s.style.top=y+'px';
                let cX=x, cY=y, op=1; document.body.appendChild(s);
                const m = setInterval(()=>{ cX+=(Math.random()-0.5)*5; cY+=(Math.random()-0.5)*5; op-=0.1; s.style.left=cX+'px'; s.style.top=cY+'px'; s.style.opacity=op; if(op<=0){clearInterval(m);s.remove();} },30);
            }
        }
        function evolveLetter(l) {
            if (l.textContent === ' ' || l.classList.contains('revealed') || l.classList.contains('spell-attempt')) return;
            l.classList.add('spell-attempt');
            setTimeout(() => {
                l.classList.remove('spell-attempt'); l.classList.add('weaving-essence');
                const r = l.getBoundingClientRect(); spawnStrands(r.left+window.scrollX, r.top+window.scrollY);
                setTimeout(() => { l.classList.remove('weaving-essence'); l.textContent = l.dataset.real; l.classList.add('revealed'); }, 200);
            }, 100);
        }
        container.querySelectorAll('.sunny-letter').forEach(l => { l.addEventListener('mouseenter', () => evolveLetter(l)); });

        // --- 3. MOTOR CINEMATOGRÁFICO DE APERTO E EXPLOSÃO ---
        const aCanvas = document.getElementById('action-canvas'); const aCtx = aCanvas.getContext('2d');
        function resAction() { aCanvas.width = window.innerWidth; aCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resAction); resAction();

        document.getElementById('mass-btn').addEventListener('click', () => {
            const charBox = document.getElementById('char-box'); const voidDarkness = document.getElementById('void');
            const boxRect = charBox.getBoundingClientRect();
            const targetX = boxRect.left + boxRect.width / 2; const targetY = boxRect.top + boxRect.height / 2;
            
            let tentacles = []; let shards = []; let flyingRunes = [];
            let timeline = 'spawning'; // spawning -> grip -> shatter -> darkness -> reveal
            let shakeStrength = 0;
            let cracks = [];

            // Os tentáculos agora nascem do fundo do Mar da Alma ou das bordas escuras inferiores
            for(let i = 0; i < 8; i++) {
                let startX = (canvas.width / 7) * i;
                let startY = canvas.height + 40; // Nascem abaixo da linha de visão do mar
                tentacles.push({
                    x: startX, y: startY, hist: [], active: true, 
                    angle: Math.atan2(targetY - startY, targetX - startX), length: 0
                });
            }

            function processScene() {
                aCtx.clearRect(0, 0, aCanvas.width, aCanvas.height);

                // --- FASE 1: RASTEJAR DOS TENTÁCULOS (Mais anatômicos) ---
                if (timeline === 'spawning' || timeline === 'grip') {
                    let allReached = true;
                    aCtx.fillStyle = "rgba(1, 2, 3, 0.99)"; aCtx.shadowBlur = 15; aCtx.shadowColor = "#000000";

                    tentacles.forEach(t => {
                        if (t.active) {
                            let dist = Math.hypot(targetX - t.x, targetY - t.y);
                            if (dist > 30) {
                                allReached = false;
                                // Movimento ondulante orgânico de tentáculo
                                t.x += Math.cos(t.angle) * 7.5 + Math.sin(t.length * 0.12) * 4;
                                t.y += Math.sin(t.angle) * 7.5 + Math.cos(t.length * 0.12) * 4;
                                t.angle = Math.atan2(targetY - t.y, targetX - t.x);
                                t.hist.push({x: t.x, y: t.y}); t.length++;
                            } else { t.active = false; }
                        }
                        
                        // Desenha o formato cônico (Grosso na base, fino na ponta)
                        t.hist.forEach((p, idx) => {
                            aCtx.beginPath();
                            let progress = idx / t.hist.length;
                            let r = Math.max(1.8, 26 * (1 - progress * 0.94)); // Base grossa afunilando perfeitamente
                            aCtx.arc(p.x, p.y, r, 0, Math.PI*2); aCtx.fill();
                        });
                    });

                    if (allReached && timeline === 'spawning') {
                        timeline = 'grip';
                        charBox.classList.add('shake-cracking');
                        
                        // Começa a gerar linhas de rachadura visuais sobre a caixa
                        setTimeout(() => { triggerShatter(); }, 1800);
                    }
                }

                // --- DESENHAR RACHADURAS NA CAIXA EM TEMPO REAL ---
                if (timeline === 'grip') {
                    shakeStrength += 0.15;
                    aCtx.strokeStyle = "rgba(0, 0, 0, 0.95)"; aCtx.lineWidth = 3;
                    if (Math.random() < 0.4) {
                        cracks.push({
                            x1: boxRect.left + Math.random()*boxRect.width, y1: boxRect.top + Math.random()*boxRect.height,
                            x2: boxRect.left + Math.random()*boxRect.width, y2: boxRect.top + Math.random()*boxRect.height
                        });
                    }
                    cracks.forEach(c => { aCtx.beginPath(); aCtx.moveTo(c.x1, c.y1); aCtx.lineTo(c.x2, c.y2); aCtx.stroke(); });
                }

                // --- FASE 2: A EXPLOSÃO (FRAGMENTAÇÃO E RUNAS VOANDO) ---
                if (timeline === 'shatter') {
                    // Desenha os pedaços da caixa voando
                    shards.forEach(s => {
                        s.x += s.vx; s.y += s.vy; s.vy += 0.3; // Gravidade nos estilhaços
                        s.rot += s.vRot;
                        aCtx.save();
                        aCtx.translate(s.x, s.y); aCtx.rotate(s.rot);
                        aCtx.fillStyle = s.color; aCtx.fillRect(-s.w/2, -s.h/2, s.w, s.h);
                        aCtx.restore();
                    });

                    // Desenha as letras rúnicas voando e se espalhando
                    aCtx.font = "18px serif";
                    aCtx.fillStyle = "rgba(45, 55, 75, 0.8)";
                    flyingRunes.forEach(r => {
                        r.x += r.vx; r.y += r.vy; r.vy += 0.15;
                        r.rot += r.vRot;
                        aCtx.save(); aCtx.translate(r.x, r.y); aCtx.rotate(r.rot);
                        aCtx.fillText(r.char, 0, 0); aCtx.restore();
                    });

                    // Limpa fragmentos fora da tela
                    shards = shards.filter(s => s.y < aCanvas.height);
                    flyingRunes = flyingRunes.filter(r => r.y < aCanvas.height);
                }

                if (timeline !== 'reveal') { requestAnimationFrame(processScene); }
            }

            function triggerShatter() {
                timeline = 'shatter';
                charBox.classList.remove('shake-cracking');
                charBox.classList.add('shatter-hidden'); // Oculta a caixa original instantaneamente
                tentacles = []; // Dissolve os tentáculos na explosão

                // Criar estilhaços da caixa (Massa escura e bordas)
                for (let i = 0; i < 45; i++) {
                    shards.push({
                        x: boxRect.left + Math.random() * boxRect.width, y: boxRect.top + Math.random() * boxRect.height,
                        vx: (Math.random() - 0.5) * 28, vy: (Math.random() - 0.7) * 22,
                        w: Math.random() * 20 + 8, h: Math.random() * 15 + 5,
                        rot: Math.random() * Math.PI, vRot: (Math.random() - 0.5) * 0.2,
                        color: Math.random() < 0.2 ? "#161c26" : "#07090d"
                    });
                }

                // Criar runas voadoras expelidas no choque
                for (let i = 0; i < 50; i++) {
                    flyingRunes.push({
                        x: targetX + (Math.random() - 0.5) * 100, y: targetY + (Math.random() - 0.5) * 100,
                        vx: (Math.random() - 0.5) * 32, vy: (Math.random() - 0.8) * 26,
                        char: runes[Math.floor(Math.random() * runes.length)],
                        rot: Math.random() * Math.PI, vRot: (Math.random() - 0.5) * 0.3
                    });
                }

                // Transição para o blecaute total
                setTimeout(() => {
                    voidDarkness.style.opacity = '1';
                    
                    setTimeout(() => {
                        // Força a tradução completa em segundo plano enquanto está escuro
                        container.querySelectorAll('.sunny-letter').forEach(l => {
                            l.textContent = l.dataset.real;
                            l.classList.add('revealed');
                        });

                        // Restaura a caixa fisicamente estruturada
                        charBox.classList.remove('shatter-hidden');
                        shards = []; flyingRunes = [];
                        aCtx.clearRect(0, 0, aCanvas.width, aCanvas.height);
                        timeline = 'reveal';

                        // A escuridão recua e revela o texto estritamente traduzido
                        setTimeout(() => { voidDarkness.style.opacity = '0'; }, 600);
                    }, 1200);

                }, 800); // Janela para ver os pedaços voando antes do breu
            }

            processScene();
        });
    </script>
</body>
</html>
