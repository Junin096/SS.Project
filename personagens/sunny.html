<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alma - Lorde das Sombras</title>
    <style>
        body { 
            background-color: #030406 !important; 
            overflow-x: hidden;
            position: relative;
            margin: 0; padding: 0;
            min-height: 100vh;
        }

        /* --- BOTÃO DE INVOCAÇÃO --- */
        .mass-translate-container { display: flex; justify-content: center; margin-bottom: 25px; margin-top: 20px; z-index: 30; position: relative; }
        .mass-translate-btn {
            background: #050608; border: 1px solid #141923; padding: 10px 20px; border-radius: 4px;
            color: #4f5b73; font-family: monospace; cursor: pointer; display: flex; align-items: center; gap: 10px;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.7); 
        }
        .mass-translate-btn:hover { border-color: #707c91; color: #ffffff; text-shadow: 0 0 5px #fff; }

        /* --- ELEMENTOS DE AMBIENTAÇÃO --- */
        .essence-thread { position: fixed; width: 200px; height: 200px; pointer-events: none; z-index: 20; opacity: 0.15; animation: threadPulse 5s infinite ease-in-out; }
        .thread-tl { top: 0; left: 0; border-left: 2px solid #141923; border-top: 2px solid #141923; background: radial-gradient(circle at top left, rgba(10,12,16,0.8) 0%, transparent 70%); }
        .thread-br { bottom: 0; right: 0; border-right: 2px solid #141923; border-bottom: 2px solid #141923; background: radial-gradient(circle at bottom right, rgba(10,12,16,0.8) 0%, transparent 70%); }
        @keyframes threadPulse { 0%, 100% { transform: scale(1); opacity: 0.15; } 50% { transform: scale(1.05); opacity: 0.3; } }

        .content-wrapper { position: relative; z-index: 10; max-width: 750px; width: 100%; margin: 0 auto; padding: 5vh 20px 40px 20px; box-sizing: border-box; }
        
        /* --- CAIXA PRINCIPAL DO PERSONAGEM (Leve transparência para o mar passar atrás) --- */
        .character-container { 
            display: flex; gap: 25px; background: rgba(8, 10, 14, 0.93); border: 1px solid #10141d; padding: 25px; 
            border-radius: 4px; box-shadow: 0 15px 50px rgba(0,0,0,0.9); align-items: center; position: relative; 
            transition: opacity 0.2s, transform 0.2s;
        }
        @media (max-width: 600px) { .character-container { flex-direction: column; text-align: center; } }
        
        .character-img { width: 180px; height: 240px; object-fit: cover; border: 1px solid #141923; border-radius: 2px; filter: grayscale(70%) brightness(55%); }

        /* --- EFEITO: TREMOR E DESTRUIÇÃO --- */
        .shake-violent { animation: shake 0.1s infinite; border-color: #222 !important; box-shadow: 0 0 40px #000 !important; }
        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            25% { transform: translate(-3px, -2px) rotate(-1deg); }
            50% { transform: translate(3px, 3px) rotate(1deg); }
            75% { transform: translate(-2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shatter { opacity: 0 !important; transform: scale(0.8) !important; pointer-events: none; }

        /* --- ESCURIDÃO ABSOLUTA --- */
        .absolute-darkness {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000; z-index: 200; opacity: 0; pointer-events: none;
            transition: opacity 1.2s ease-in-out;
        }

        /* --- TEXTOS E AS SOMBRAS ROLANTES --- */
        .sunny-rune-text p { margin: 12px 0; font-family: monospace; font-size: 16px; min-height: 20px; color: #2d3545; }
        .sunny-letter { display: inline-block; font-family: serif; color: #222936; transition: all 0.2s; }
        
        .sunny-letter.spell-attempt { color: #000 !important; transform: scale(0.8); }
        .sunny-letter.weaving-essence { color: #000 !important; text-shadow: 0 0 10px #000 !important; transform: scale(1.3); }
        
        /* Aspecto mais escuro com sombras rastejantes e cíclicas */
        .sunny-letter.revealed { 
            color: #63718a !important; 
            font-weight: bold;
            animation: rollingShadow 4s infinite ease-in-out;
        }
        @keyframes rollingShadow {
            0%, 100% { text-shadow: 0 2px 4px #000, 0 0 6px rgba(0,0,0,0.9); color: #525e75 !important; }
            50% { text-shadow: 0 -3px 8px #000, 0 0 12px rgba(0,0,0,1); color: #73829c !important; transform: translateY(-0.5px); }
        }

        .shadow-strand { position: fixed; pointer-events: none; z-index: 100; border-radius: 50%; background: #000; box-shadow: 0 0 5px #000; }
        
        /* Motores Gráficos */
        #ambient-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 4; }
        #tentacle-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 150; }

        .back-btn-container { display: flex; justify-content: center; margin-top: 40px; z-index: 20; position: relative; }
        .back-btn { background: transparent; border: 1px solid #141923; padding: 10px 30px; border-radius: 4px; color: #4f5b73; font-family: monospace; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; }
        .back-btn:hover { background: #050608; border-color: #5c6982; color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="absolute-darkness" id="void"></div>

    <div class="essence-thread thread-tl"></div>
    <div class="essence-thread thread-br"></div>
    
    <canvas id="ambient-canvas"></canvas>
    <canvas id="tentacle-canvas"></canvas> 

    <div class="content-wrapper">
        <div class="mass-translate-container">
            <button class="mass-translate-btn" id="mass-btn">
                Manifestar Tentáculos de Sombra
            </button>
        </div>

        <div class="character-container" id="char-box">
            <img src="../img/lossunny.jpg" alt="Sunless" class="character-img">
            
            <div class="sunny-rune-text" id="sunny-soul-core">
                <p>Nome Verdadeiro: Perdido da Luz</p>
                <p>Nome: Sunless</p>
                <p>Rank: Soberano</p>
                <p>Classe: Divina</p>
                <p>Atributos: [Lorde das Sombras], [Mestre das Sombras], [Encarnação das Trevas]</p>
            </div>
        </div>

        <div class="back-btn-container">
            <a href="../index.html" class="back-btn">← Retornar à Base</a>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURAÇÃO E ENGINE DO MAR DA ALMA (7 SÓIS NEGROS) ---
        const canvas = document.getElementById('ambient-canvas'); const ctx = canvas.getContext('2d');
        let particles = []; 
        function resCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resCanvas); resCanvas();

        // Partículas de essência que sobem do mar
        class P { constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.size = Math.random()*1.5; this.speedY = -0.15; } update() { this.y += this.speedY; if(this.y<0) this.y=canvas.height; } draw() { ctx.fillStyle = "rgba(45,53,69,0.25)"; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); } }
        for(let i=0;i<30;i++) particles.push(new P());

        // Coordenadas proporcionais para os 7 Sóis Negros no céu da alma
        const suns = [
            {x: 0.15, y: 0.22, r: 28}, {x: 0.28, y: 0.15, r: 34}, {x: 0.42, y: 0.25, r: 25},
            {x: 0.50, y: 0.12, r: 45}, // Sol Central Dominante
            {x: 0.58, y: 0.25, r: 25}, {x: 0.72, y: 0.15, r: 34}, {x: 0.85, y: 0.22, r: 28}
        ];

        let waveOffset = 0;
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            
            // Desenhar os 7 Sóis Negros com contorno branco pálido
            suns.forEach(s => {
                let sX = s.x * canvas.width; let sY = s.y * canvas.height;
                ctx.beginPath();
                ctx.arc(sX, sY, s.r, 0, Math.PI * 2);
                ctx.fillStyle = "#000000";
                ctx.shadowColor = "rgba(255, 255, 255, 0.25)"; ctx.shadowBlur = 12;
                ctx.fill();
                ctx.shadowBlur = 0; // Reseta o blur
                ctx.strokeStyle = "rgba(235, 240, 250, 0.8)"; ctx.lineWidth = 1.5;
                ctx.stroke();
            });

            // Desenhar o Mar de Água totalmente preta com contornos cinza-escuro
            waveOffset += 0.012;
            const waveLayers = [
                { y: canvas.height * 0.68, freq: 0.004, amp: 18, speed: 1, stroke: "#12161f" },
                { y: canvas.height * 0.74, freq: 0.007, amp: 12, speed: -1.3, stroke: "#0f121a" },
                { y: canvas.height * 0.82, freq: 0.003, amp: 22, speed: 0.8, stroke: "#161b26" },
                { y: canvas.height * 0.90, freq: 0.005, amp: 15, speed: -0.6, stroke: "#0b0e14" }
            ];

            waveLayers.forEach(layer => {
                ctx.beginPath(); ctx.moveTo(0, canvas.height);
                for (let x = 0; x <= canvas.width; x += 15) {
                    let y = layer.y + Math.sin(x * layer.freq + waveOffset * layer.speed) * layer.amp;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(canvas.width, canvas.height); ctx.closePath();
                ctx.fillStyle = "#000000"; ctx.fill(); // Água preta absoluta
                ctx.strokeStyle = layer.stroke; ctx.lineWidth = 2.5; ctx.stroke(); // Linhas divisórias escuras
            });

            particles.forEach(p=>{p.update();p.draw();});
            requestAnimationFrame(anim);
        } anim();

        // --- 2. SISTEMA RÚNICO (INDIVIDUAL) ---
        const runes = ['ᚦ', 'ᚧ', 'ᚨ', 'ᛒ', 'ᛃ', 'ᛄ', 'ᛅ', 'ᛆ', 'ᛇ'];
        const container = document.getElementById('sunny-soul-core');
        container.querySelectorAll('p').forEach(p => {
            const txt = p.textContent; p.textContent = '';
            for (let i = 0; i < txt.length; i++) {
                const span = document.createElement('span'); span.classList.add('sunny-letter');
                span.dataset.real = txt[i]; span.textContent = txt[i] === ' ' ? ' ' : runes[Math.floor(Math.random() * runes.length)];
                p.appendChild(span);
            }
        });

        function spawnStrands(x,y){
            for(let i=0; i<3; i++){
                const s = document.createElement('div'); s.classList.add('shadow-strand');
                s.style.width='3px'; s.style.height='3px'; s.style.left=x+'px'; s.style.top=y+'px';
                let cX=x, cY=y, op=1; document.body.appendChild(s);
                const m = setInterval(()=>{ cX+=(Math.random()-0.5)*5; cY+=(Math.random()-0.5)*5; op-=0.1; s.style.left=cX+'px'; s.style.top=cY+'px'; s.style.opacity=op; if(op<=0){clearInterval(m);s.remove();} },30);
            }
        }
        function evolveLetter(l) {
            if (l.textContent === ' ' || l.classList.contains('revealed') || l.classList.contains('spell-attempt')) return;
            l.classList.add('spell-attempt');
            setTimeout(() => {
                l.classList.remove('spell-attempt'); l.classList.add('weaving-essence');
                const r = l.getBoundingClientRect(); spawnStrands(r.left+window.scrollX, r.top+window.scrollY);
                setTimeout(() => { l.classList.remove('weaving-essence'); l.textContent = l.dataset.real; l.classList.add('revealed'); }, 200);
            }, 100);
        }
        container.querySelectorAll('.sunny-letter').forEach(l => { l.addEventListener('mouseenter', () => evolveLetter(l)); });

        // --- 3. EVENTO SUPREMO: TENTÁCULOS ANATÔMICOS E ERUPÇÃO ---
        const tCanvas = document.getElementById('tentacle-canvas'); const tCtx = tCanvas.getContext('2d');
        function resTentacle() { tCanvas.width = window.innerWidth; tCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resTentacle); resTentacle();

        document.getElementById('mass-btn').addEventListener('click', () => {
            const charBox = document.getElementById('char-box'); const voidDarkness = document.getElementById('void');
            const boxRect = charBox.getBoundingClientRect();
            const targetX = boxRect.left + boxRect.width / 2; const targetY = boxRect.top + boxRect.height / 2;
            
            let tentacles = []; let isShaking = false; let particlesErupt = [];
            const starts = [
                {x: 0, y: 0}, {x: tCanvas.width, y: 0}, {x: 0, y: tCanvas.height}, {x: tCanvas.width, y: tCanvas.height},
                {x: tCanvas.width/2, y: 0}, {x: tCanvas.width/2, y: tCanvas.height}, {x: 0, y: tCanvas.height/2}, {x: tCanvas.width, y: tCanvas.height/2}
            ];

            starts.forEach(pos => { tentacles.push({ x: pos.x, y: pos.y, hist: [], active: true, angle: Math.atan2(targetY - pos.y, targetX - pos.x), length: 0 }); });

            function dramatics() {
                tCtx.clearRect(0, 0, tCanvas.width, tCanvas.height);
                let allReached = true;

                tCtx.fillStyle = "rgba(2, 3, 5, 0.98)"; tCtx.shadowBlur = 15; tCtx.shadowColor = "#000";

                tentacles.forEach(t => {
                    if (t.active) {
                        let dist = Math.hypot(targetX - t.x, targetY - t.y);
                        if (dist > 25) {
                            allReached = false;
                            t.x += Math.cos(t.angle) * 6.5 + Math.sin(t.length * 0.15) * 5;
                            t.y += Math.sin(t.angle) * 6.5 + Math.cos(t.length * 0.15) * 5;
                            t.angle = Math.atan2(targetY - t.y, targetX - t.x);
                            t.hist.push({x: t.x, y: t.y});
                            t.length++;
                        } else { t.active = false; }
                    }
                    
                    // RENDERIZAÇÃO ANATÔMICA DOS TENTÁCULOS (Grosso na base, fino na ponta)
                    t.hist.forEach((p, idx) => {
                        tCtx.beginPath();
                        let progress = idx / t.hist.length; // Transição de 0 (base) a 1 (ponta)
                        let r = Math.max(1.5, 24 * (1 - progress * 0.92)); // Começa com 24px e afunila perfeitamente até a ponta fina
                        tCtx.arc(p.x, p.y, r, 0, Math.PI*2); tCtx.fill();
                    });
                });

                if (allReached && !isShaking) {
                    isShaking = true; charBox.classList.add('shake-violent');
                    setTimeout(() => {
                        charBox.classList.remove('shake-violent'); charBox.classList.add('shatter');
                        for(let i=0; i<80; i++) { particlesErupt.push({ x: targetX, y: targetY, vx: (Math.random()-0.5)*35, vy: (Math.random()-0.5)*35, r: Math.random()*12 + 4, life: 1 }); }
                        voidDarkness.style.opacity = '1';
                        
                        setTimeout(() => {
                            container.querySelectorAll('.sunny-letter').forEach(l => { l.textContent = l.dataset.real; l.classList.add('revealed'); });
                            charBox.classList.remove('shatter'); tCtx.clearRect(0, 0, tCanvas.width, tCanvas.height);
                            setTimeout(() => { voidDarkness.style.opacity = '0'; }, 800);
                        }, 1400);
                    }, 2000);
                }

                if (particlesErupt.length > 0) {
                    particlesErupt.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; p.r *= 0.95; if(p.life > 0) { tCtx.beginPath(); tCtx.arc(p.x, p.y, p.r, 0, Math.PI*2); tCtx.fill(); } });
                }

                if (!allReached || particlesErupt.some(p => p.life > 0)) { requestAnimationFrame(dramatics); }
            } dramatics();
        });
    </script>
</body>
</html>
