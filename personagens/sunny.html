<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alma - Lorde das Sombras</title>
    <link rel="stylesheet" href="../css/style.css?v=8">
    
    <style>
        body { 
            background-color: #0d0f12 !important; /* Tons de preto visíveis e diferenciados */
            overflow-x: hidden;
            position: relative;
            margin: 0; padding: 0;
        }

        /* --- DESIGN DO BOTÃO DE TRADUÇÃO EM MASSA --- */
        .mass-translate-container {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }
        .mass-translate-btn {
            background: #181b22;
            border: 1px solid #2d333f;
            padding: 10px 20px;
            border-radius: 4px;
            color: #8a95a5;
            font-family: monospace;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .mass-translate-btn:hover {
            border-color: #4f5b73;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }
        .mass-translate-icon {
            width: 18px; height: 18px;
            object-fit: contain;
            filter: brightness(0.8);
        }

        /* --- AJUSTE DE CONTRASTE DO CONTAINER --- */
        .character-container {
            display: flex; gap: 25px;
            background: #13161c; /* Fundo que destaca o texto */
            border: 1px solid #222730;
            padding: 25px; border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            align-items: center;
            position: relative;
        }

        @media (max-width: 600px) {
            .character-container { flex-direction: column; text-align: center; padding: 20px; }
            .nav-menu { justify-content: center !important; }
        }

        .character-img {
            width: 180px; height: 240px; object-fit: cover;
            border: 1px solid #2d333f; border-radius: 2px;
            filter: grayscale(40%) brightness(75%);
        }

        /* --- COMPORTAMENTO VISÍVEL DAS LETRAS --- */
        .sunny-rune-text p { margin: 12px 0; font-family: monospace; font-size: 16px; min-height: 20px; }
        
        .sunny-letter { 
            display: inline-block; 
            font-family: serif; 
            color: #2d333f; /* Runas visíveis como névoa escura antes de traduzir */
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
            transition: all 0.2s ease;
        }
        .sunny-letter.revealed { 
            color: #cbd5e1 !important; /* Texto limpo e legível pós-tradução */
            text-shadow: none !important;
            transform: scale(1);
        }

        /* Canvas dedicado para a Serpente de Sombra */
        #snake-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 15;
        }
    </style>
</head>
<body>

    <div class="content-wrapper" style="max-width: 750px; margin: 0 auto; padding: 5vh 20px;">
        <nav class="nav-menu" style="display: flex; gap: 20px; margin-bottom: 20px;">
            <a href="../index.html" style="color: #4f5b73; text-decoration: none; font-family: monospace;">[ Início ]</a>
            <a href="../personagens.html" style="color: #4f5b73; text-decoration: none; font-family: monospace;">[ Personagens ]</a>
        </nav>

        <div class="mass-translate-container">
            <button class="mass-translate-btn" id="mass-btn">
                <img src="../img/nephischibi.jpg" alt="👁️" class="mass-translate-icon">
                Tradução Cósmica em Massa
            </button>
        </div>

        <div class="character-container">
            <canvas id="snake-canvas"></canvas>
            <img src="../imagens/Sunny.jpg" alt="Sunless" class="character-img">
            
            <div class="sunny-rune-text" id="sunny-soul-core">
                <p>Nome Verdadeiro: Perdido da Luz</p>
                <p>Nome: Sunless</p>
                <p>Rank: Soberano</p>
                <p>Classe: Divina</p>
                <p>Atributos: [Lorde das Sombras], [Mestre das Sombras], [Encarnação das Trevas]</p>
            </div>
        </div>
    </div>

    <script>
        const runes = ['ᚦ', 'ᚧ', 'ᚨ', 'ᛒ', 'ᛃ', 'ᛄ', 'ᛅ', 'ᛆ', 'ᛇ'];
        const container = document.getElementById('sunny-soul-core');
        const paragraphs = container.querySelectorAll('p');

        paragraphs.forEach(p => {
            const originalText = p.textContent; p.textContent = '';
            for (let i = 0; i < originalText.length; i++) {
                const span = document.createElement('span'); 
                span.classList.add('sunny-letter');
                span.dataset.real = originalText[i];
                span.textContent = originalText[i] === ' ' ? ' ' : runes[Math.floor(Math.random() * runes.length)];
                p.appendChild(span);
            }
        });

        // --- ANIMAÇÃO CINEMATOGRÁFICA DA SERPENTE DE SOMBRA ---
        const sCanvas = document.getElementById('snake-canvas');
        const sCtx = sCanvas.getContext('2d');
        
        function resizeSnakeCanvas() {
            sCanvas.width = sCanvas.parentElement.offsetWidth;
            sCanvas.height = sCanvas.parentElement.offsetHeight;
        }
        window.addEventListener('resize', resizeSnakeCanvas); resizeSnakeCanvas();

        document.getElementById('mass-btn').addEventListener('click', () => {
            resizeSnakeCanvas();
            let snakeX = -50;
            const snakeY = sCanvas.height / 2;
            const letters = container.querySelectorAll('.sunny-letter');

            function drawSnake() {
                sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
                
                // Desenha corpo da serpente flutuante/escura
                sCtx.fillStyle = "rgba(5, 6, 8, 0.95)";
                sCtx.shadowBlur = 20;
                sCtx.shadowColor = "#000";
                
                sCtx.beginPath();
                for (let i = 0; i < 120; i++) {
                    const x = snakeX - i * 2;
                    const y = snakeY + Math.sin(x * 0.05) * 40; // Movimento ondulado de serpente
                    const size = Math.max(0, 35 - i * 0.25); // Afunilamento do rabo
                    if(x > -50) sCtx.arc(x, y, size, 0, Math.PI * 2);
                }
                sCtx.fill();

                // Verifica colisão da cabeça da serpente com as letras para esmagá-las e traduzi-as
                letters.forEach(l => {
                    if (l.textContent === ' ' || l.classList.contains('revealed')) return;
                    const rect = l.getBoundingClientRect();
                    const containerRect = sCanvas.getBoundingClientRect();
                    const lX = rect.left - containerRect.left;
                    
                    if (snakeX > lX) {
                        l.textContent = l.dataset.real;
                        l.classList.add('revealed');
                    }
                });

                snakeX += 12; // Velocidade do ataque da serpente
                if (snakeX < sCanvas.width + 300) {
                    requestAnimationFrame(drawSnake);
                } else {
                    sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height); // Desaparece nas sombras
                }
            }
            drawSnake();
        });
    </script>
</body>
</html>
