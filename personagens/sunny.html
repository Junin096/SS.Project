<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alma - Lorde das Sombras</title>
    <style>
        /* --- ESTILOS GLOBAIS --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050505; overflow: hidden; font-family: monospace;
            color: #e0f7fa; cursor: default;
        }

        /* --- TELA DE RENDERIZAÇÃO --- */
        #ambient-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }

        /* --- INTERFACE E CAIXA --- */
        .content-wrapper {
            position: relative; z-index: 20; max-width: 750px; width: 100%; height: 100%; margin: 0 auto;
            padding: 5vh 20px 40px 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center;
            justify-content: center; pointer-events: none; /* Deixa o rastro do mouse passar por cima em áreas vazias */
        }
        
        .mass-translate-container, .character-container, .back-btn-container { pointer-events: auto; }

        .mass-translate-container { position: absolute; top: 5vh; z-index: 30; }
        .mass-translate-btn {
            background: #050608; border: 1px solid #141923; padding: 12px 24px; border-radius: 4px;
            color: #4f5b73; font-family: monospace; font-size: 14px; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }
        .mass-translate-btn:hover { border-color: #ffffff; color: #ffffff; text-shadow: 0 0 8px #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); }

        .character-container {
            display: flex; flex-direction: column; gap: 20px;
            background: transparent; border: none; box-shadow: none;
            align-items: center; text-align: center; position: relative;
        }
        
        .character-img { 
            width: 140px; height: 140px; object-fit: cover; border-radius: 50%; 
            border: 2px solid #ffffff; filter: grayscale(80%) brightness(70%); 
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* --- TEXTOS DAS RUNAS --- */
        .sunny-rune-text p { margin: 8px 0; font-family: monospace; font-size: 16px; color: #555c6b; }
        
        .sunny-letter { 
            display: inline-block; font-family: serif; color: #4a5463; 
            transition: color 0.3s, text-shadow 0.3s;
        }

        /* Efeito de Hover: Preto estático -> Branco brilhante e legível */
        .hover-translate {
            animation: hoverReveal 0.6s forwards;
        }
        @keyframes hoverReveal {
            0% { color: #000000; text-shadow: 0 0 12px rgba(255,255,255,0.9); }
            100% { color: #ffffff; text-shadow: 0 0 6px rgba(255,255,255,0.4); }
        }

        /* Animação de Estilhaçamento (Shatter) */
        .shatter-anim {
            animation: shatterFade 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes shatterFade {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; filter: blur(0); color: #000; text-shadow: 0 0 15px #fff; }
            30% { color: transparent; text-shadow: 0 0 20px rgba(255,255,255,0.8); }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(var(--tr)); opacity: 0; filter: blur(5px); color: transparent; text-shadow: none; }
        }

        /* O Estado Revelado Final (Branco Forte) */
        .sunny-letter.revealed {
            color: #ffffff !important; font-weight: bold; text-shadow: 0 0 10px rgba(255,255,255,0.8);
            animation: gentleFloat 4s infinite ease-in-out;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }

        /* --- ESCURIDÃO ABSOLUTA --- */
        .absolute-darkness {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000; z-index: 200; opacity: 0; pointer-events: none;
            transition: opacity 0.8s ease-in-out;
        }
        .scene-title { position: fixed; bottom: 15px; left: 20px; font-size: 1.2rem; letter-spacing: 0.2rem; color: rgba(255, 255, 255, 0.4); z-index: 5; }

        .back-btn-container { position: absolute; bottom: 5vh; }
        .back-btn { border: 1px solid #141923; padding: 10px 30px; border-radius: 4px; color: #4f5b73; text-decoration: none; text-transform: uppercase; transition: 0.3s; }
        .back-btn:hover { background: #050608; color: #fff; border-color: #fff; }
    </style>
</head>
<body>

    <div class="absolute-darkness" id="void"></div>
    <div class="scene-title">COSTA ESQUECIDA - MAR DA ALMA</div>

    <canvas id="ambient-canvas"></canvas>

    <div class="content-wrapper">
        <div class="mass-translate-container">
            <button class="mass-translate-btn" id="mass-btn">Traduzir Registro da Alma</button>
        </div>

        <div class="character-container" id="char-box">
            <img src="../img/lossunny.jpg" alt="Sunless" class="character-img">
            <div class="sunny-rune-text" id="sunny-soul-core">
                <p>Nome Verdadeiro: Perdido da Luz</p>
                <p>Nome: Sunless</p>
                <p>Rank: Soberano</p>
                <p>Classe: Divina</p>
                <p>Atributos: [Lorde das Sombras], [Mestre das Sombras], [Encarnação das Trevas]</p>
            </div>
        </div>

        <div class="back-btn-container"><a href="../index.html" class="back-btn">← Retornar à Base</a></div>
    </div>

    <script>
        // --- 1. MOTOR DO MAR E DOS SÓIS ---
        const ambCanvas = document.getElementById('ambient-canvas');
        const ambCtx = ambCanvas.getContext('2d');
        const charBox = document.getElementById('char-box');
        
        let ambTime = 0;
        let isTranslating = false; 
        let whirlFactor = 0; // Controla a força do redemoinho (0 a 1)
        
        // --- Rastro do Mouse ---
        let mouseTrail = [];
        window.addEventListener('mousemove', (e) => {
            mouseTrail.push({ x: e.clientX, y: e.clientY, life: 1.0 });
        });

        // 6 Pequenos sóis espalhados na parte superior
        const smallSuns = [];
        for (let i = 0; i < 6; i++) {
            smallSuns.push({
                x: 0.1 + (i * 0.15) + (Math.random() * 0.05),
                y: Math.random() * 0.25 + 0.05,
                size: Math.random() * 12 + 8
            });
        }

        // Bolinhas brancas orbitando o 7º Sol
        const orbs = [];
        for(let i = 0; i < 15; i++) {
            orbs.push({
                angle: (Math.PI * 2 / 15) * i,
                speed: 0.01 + Math.random() * 0.01,
                distanceOffset: Math.random() * 25 - 10,
                size: Math.random() * 4.5 + 1.5 
            });
        }

        let bubbles = [];
        function initBubbles() {
            bubbles = [];
            for(let i=0; i<40; i++) {
                bubbles.push({
                    x: Math.random() * window.innerWidth,
                    y: window.innerHeight + Math.random() * 400,
                    speed: Math.random() * 1.5 + 0.5,
                    size: Math.random() * 2.5 + 0.5
                });
            }
        }

        function resizeAmbient() {
            ambCanvas.width = window.innerWidth;
            ambCanvas.height = window.innerHeight;
            initBubbles();
        }
        window.addEventListener('resize', resizeAmbient);

        function drawAmbient() {
            ambCtx.fillStyle = '#050505'; 
            ambCtx.fillRect(0, 0, ambCanvas.width, ambCanvas.height);

            // Bolhas
            ambCtx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            bubbles.forEach(b => {
                b.y -= b.speed + (isTranslating ? 4 : 0); // Muito mais rápido
                if(b.y < ambCanvas.height * 0.3) { 
                    b.y = ambCanvas.height + 50; 
                    b.x = Math.random() * ambCanvas.width; 
                }
                ambCtx.beginPath();
                ambCtx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ambCtx.fill();
            });

            // Pequenos Sóis
            smallSuns.forEach(sun => {
                ambCtx.beginPath();
                ambCtx.arc(sun.x * ambCanvas.width, sun.y * ambCanvas.height, sun.size, 0, Math.PI * 2);
                ambCtx.fillStyle = '#000000';
                ambCtx.shadowColor = 'rgba(255, 255, 255, 0.4)';
                ambCtx.shadowBlur = 15;
                ambCtx.fill();
                ambCtx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ambCtx.lineWidth = 1;
                ambCtx.stroke();
                ambCtx.shadowBlur = 0;
            });

            // Atualiza Fator do Redemoinho
            whirlFactor += isTranslating ? 0.02 : -0.01;
            whirlFactor = Math.max(0, Math.min(1, whirlFactor));

            // Centro base da tela/sol
            const boxRect = charBox.getBoundingClientRect();
            const cx = boxRect.left + boxRect.width / 2;
            const cy = boxRect.top + boxRect.height / 2;

            // Oceano com Correntezas e Redemoinho
            let seaLevel = ambCanvas.height * 0.82;
            for(let i = 0; i < 4; i++) {
                ambCtx.beginPath();
                ambCtx.moveTo(0, ambCanvas.height);
                ambCtx.lineTo(0, seaLevel + i * 12);
                
                for(let x = 0; x <= ambCanvas.width; x += 30) {
                    let dx = x - cx;
                    let dist = Math.abs(dx);
                    
                    // Lógica do Redemoinho: puxa a água pra baixo perto do centro quando whirlFactor > 0
                    let whirlPull = Math.max(0, 300 - dist) / 300; 
                    let pullDown = whirlPull * 200 * whirlFactor; 

                    let waveSpeed = ambTime * (1 + i * 0.15) * (1 + whirlFactor * 8); // Água muito agressiva
                    let baseHeight = seaLevel + i * 12;

                    // O x também "entorta" levemente simulando o redemoinho puxando pro centro
                    let swirlOffset = (dx > 0 ? -1 : 1) * whirlPull * 50 * whirlFactor;
                    
                    let y = baseHeight + pullDown + Math.sin((x + swirlOffset) * 0.01 + waveSpeed) * (5 + i * 2) * (1 + whirlFactor * 3) + Math.cos(x * 0.005 - waveSpeed * 0.5) * 3;
                    ambCtx.lineTo(x, y);
                }
                ambCtx.lineTo(ambCanvas.width, ambCanvas.height);
                
                ambCtx.fillStyle = `rgba(5, 5, 5, 0.9)`; 
                ambCtx.fill();
                ambCtx.strokeStyle = `rgba(50, 50, 50, ${0.4 + i * 0.1})`; 
                ambCtx.lineWidth = 1.5;
                ambCtx.stroke();
            }

            // O 7º Sol Grande
            const baseRadius = Math.max(boxRect.width, boxRect.height) / 1.5;

            // Chamas Brancas Ondulantes do 7º Sol (Tamanhos Variados)
            ambCtx.beginPath();
            for(let a = 0; a <= Math.PI * 2.1; a += 0.05) {
                let waveIntensity = isTranslating ? 60 : 12;
                let speedMultiplier = isTranslating ? 40 : 4; // Rotação bem mais rápida
                
                // Combinação de duas ondas (uma maior, uma menor) para chamas irregulares
                let wave1 = Math.sin(a * 14 + ambTime * speedMultiplier) * waveIntensity;
                let wave2 = Math.cos(a * 7 - ambTime * (speedMultiplier * 0.8)) * (waveIntensity * 0.6);
                let wave = wave1 + wave2;
                
                let r = baseRadius + wave;
                let x = cx + Math.cos(a) * r;
                let y = cy + Math.sin(a) * r;
                
                if (a === 0) ambCtx.moveTo(x, y);
                else ambCtx.lineTo(x, y);
            }
            ambCtx.closePath();
            ambCtx.fillStyle = '#ffffff'; 
            ambCtx.shadowColor = '#ffffff';
            ambCtx.shadowBlur = isTranslating ? 100 : 25; 
            ambCtx.fill();
            ambCtx.shadowBlur = 0; 

            // Núcleo Negro Perfeito
            ambCtx.beginPath();
            ambCtx.arc(cx, cy, baseRadius - 2, 0, Math.PI * 2); 
            ambCtx.fillStyle = '#000000';
            ambCtx.fill();

            // Orbes Girando
            orbs.forEach(orb => {
                orb.angle += isTranslating ? orb.speed * 12 : orb.speed; 
                let orbRadius = baseRadius + 30 + orb.distanceOffset + (isTranslating ? 35 : 0);
                let oX = cx + Math.cos(orb.angle) * orbRadius;
                let oY = cy + Math.sin(orb.angle) * orbRadius;

                ambCtx.beginPath();
                ambCtx.arc(oX, oY, orb.size, 0, Math.PI * 2);
                ambCtx.fillStyle = '#ffffff';
                ambCtx.shadowColor = '#ffffff';
                ambCtx.shadowBlur = 8;
                ambCtx.fill();
                ambCtx.shadowBlur = 0;
            });

            // Desenhar Rastro do Mouse (esfumaçado preto)
            for (let i = 0; i < mouseTrail.length; i++) {
                let p = mouseTrail[i];
                ambCtx.beginPath();
                ambCtx.arc(p.x, p.y, p.life * 6, 0, Math.PI * 2);
                ambCtx.fillStyle = `rgba(0, 0, 0, ${p.life * 0.8})`; // Cor preta
                ambCtx.shadowColor = `rgba(255, 255, 255, ${p.life * 0.5})`; // Leve brilho branco
                ambCtx.shadowBlur = 5;
                ambCtx.fill();
                ambCtx.shadowBlur = 0;
                p.life -= 0.04; // Velocidade em que a partícula some
            }
            // Remove partículas mortas
            mouseTrail = mouseTrail.filter(p => p.life > 0);

            ambTime += 0.01;
            requestAnimationFrame(drawAmbient);
        }
        
        resizeAmbient(); 
        drawAmbient();

        // --- 2. GERAÇÃO DO TEXTO E EVENTOS DE HOVER ---
        const runes = ['ᚦ', 'ᚧ', 'ᚨ', 'ᛒ', 'ᛃ', 'ᛄ', 'ᛅ', 'ᛆ', 'ᛇ', 'ᛈ', 'ᛉ'];
        const container = document.getElementById('sunny-soul-core');
        
        container.querySelectorAll('p').forEach(p => {
            const txt = p.textContent; p.textContent = '';
            for (let i = 0; i < txt.length; i++) {
                const span = document.createElement('span'); span.classList.add('sunny-letter');
                const runeChar = txt[i] === ' ' ? ' ' : runes[Math.floor(Math.random() * runes.length)];
                
                span.dataset.real = txt[i]; 
                span.dataset.rune = runeChar;
                span.textContent = runeChar;

                span.style.setProperty('--tx', (Math.random() * 60 - 30) + 'px');
                span.style.setProperty('--ty', (Math.random() * -60 - 20) + 'px');
                span.style.setProperty('--tr', (Math.random() * 180 - 90) + 'deg');

                // Novo Hover: Troca a letra e adiciona a animação de Preto para Branco
                span.addEventListener('mouseenter', () => {
                    if(!span.classList.contains('revealed') && !isTranslating) {
                        span.textContent = span.dataset.real;
                        span.classList.add('hover-translate');
                    }
                });
                span.addEventListener('mouseleave', () => {
                    if(!span.classList.contains('revealed') && !isTranslating) {
                        span.textContent = span.dataset.rune;
                        span.classList.remove('hover-translate');
                    }
                });

                p.appendChild(span);
            }
        });

        // --- 3. ANIMAÇÃO COMPLETA DE TRADUÇÃO (Tempos Mais Rápidos) ---
        document.getElementById('mass-btn').addEventListener('click', () => {
            if(isTranslating) return; 
            isTranslating = true;
            const voidDarkness = document.getElementById('void');

            // Sol queima instantaneamente e gera o redemoinho na água.
            
            // Reduzido de 2000ms para 1000ms
            setTimeout(() => {
                voidDarkness.style.opacity = '1'; 
                
                // Reduzido de 1500ms para 800ms na escuridão
                setTimeout(() => {
                    container.querySelectorAll('.sunny-letter').forEach(l => {
                        l.textContent = l.dataset.real;
                        l.style.color = '#000000';
                        l.style.textShadow = '0 0 15px #ffffff';
                        l.classList.remove('hover-translate'); // Garante limpeza do hover
                    });

                    voidDarkness.style.opacity = '0';
                    isTranslating = false; // Redemoinho começa a perder força suavemente
                    
                    // Deixa preto, depois de 400ms estilhaça rápido
                    setTimeout(() => {
                        container.querySelectorAll('.sunny-letter').forEach(l => {
                            l.style.color = ''; 
                            l.style.textShadow = '';
                            l.classList.add('shatter-anim'); 
                        });

                        // Revela o branco em 600ms
                        setTimeout(() => {
                            container.querySelectorAll('.sunny-letter').forEach(l => {
                                l.classList.remove('shatter-anim');
                                l.classList.add('revealed');
                            });
                        }, 600); 

                    }, 400); 

                }, 800); 
            }, 1000); 
        });
    </script>
</body>
</html>
