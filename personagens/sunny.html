<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alma - Lorde das Sombras</title>
    <style>
        /* --- ESTILOS GLOBAIS --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000000; overflow: hidden; font-family: monospace;
            color: #e0f7fa;
        }

        /* --- TELA DE RENDERIZAÇÃO --- */
        #ambient-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }

        /* --- INTERFACE E CAIXA --- */
        .content-wrapper {
            position: relative; z-index: 20; max-width: 750px; width: 100%; height: 100%; margin: 0 auto;
            padding: 5vh 20px 40px 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center;
            justify-content: center;
        }

        .mass-translate-container { position: absolute; top: 5vh; z-index: 30; }
        .mass-translate-btn {
            background: #050608; border: 1px solid #141923; padding: 12px 24px; border-radius: 4px;
            color: #4f5b73; font-family: monospace; font-size: 14px; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }
        .mass-translate-btn:hover { border-color: #ffffff; color: #ffffff; text-shadow: 0 0 8px #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); }

        /* Container agora é transparente para sentar dentro do sol negro */
        .character-container {
            display: flex; flex-direction: column; gap: 20px;
            background: transparent; border: none; box-shadow: none;
            align-items: center; text-align: center; position: relative;
        }
        
        .character-img { 
            width: 140px; height: 140px; object-fit: cover; border-radius: 50%; 
            border: 2px solid #ffffff; filter: grayscale(80%) brightness(70%); 
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* --- TEXTOS DAS RUNAS --- */
        .sunny-rune-text p { margin: 8px 0; font-family: monospace; font-size: 16px; color: #555c6b; }
        .sunny-letter { 
            display: inline-block; font-family: serif; color: #4a5463; 
            transition: color 0.5s, text-shadow 0.5s;
        }
        
        /* O Brilho Preto Inicial da Tradução */
        .black-flash {
            color: #000000 !important;
            text-shadow: 0 0 8px #ffffff, 0 0 15px #ffffff, 0 0 30px #ffffff !important;
            font-weight: bold;
            transform: scale(1.05);
        }

        /* O Estado Revelado Final */
        .sunny-letter.revealed {
            color: #ffffff !important; font-weight: bold; text-shadow: 0 0 8px rgba(255,255,255,0.6);
            animation: gentleFloat 4s infinite ease-in-out;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }

        /* --- ESCURIDÃO ABSOLUTA --- */
        .absolute-darkness {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000; z-index: 200; opacity: 0; pointer-events: none;
            transition: opacity 1.2s ease-in-out;
        }
        .scene-title { position: fixed; bottom: 15px; left: 20px; font-size: 1.2rem; letter-spacing: 0.2rem; color: rgba(255, 255, 255, 0.4); z-index: 5; }

        .back-btn-container { position: absolute; bottom: 5vh; }
        .back-btn { border: 1px solid #141923; padding: 10px 30px; border-radius: 4px; color: #4f5b73; text-decoration: none; text-transform: uppercase; transition: 0.3s; }
        .back-btn:hover { background: #050608; color: #fff; border-color: #fff; }
    </style>
</head>
<body>

    <div class="absolute-darkness" id="void"></div>
    <div class="scene-title">COSTA ESQUECIDA - MAR DA ALMA</div>

    <canvas id="ambient-canvas"></canvas>

    <div class="content-wrapper">
        <div class="mass-translate-container">
            <button class="mass-translate-btn" id="mass-btn">Traduzir Registro da Alma</button>
        </div>

        <div class="character-container" id="char-box">
            <img src="../img/lossunny.jpg" alt="Sunless" class="character-img">
            <div class="sunny-rune-text" id="sunny-soul-core">
                <p>Nome Verdadeiro: Perdido da Luz</p>
                <p>Nome: Sunless</p>
                <p>Rank: Soberano</p>
                <p>Classe: Divina</p>
                <p>Atributos: [Lorde das Sombras], [Mestre das Sombras], [Encarnação das Trevas]</p>
            </div>
        </div>

        <div class="back-btn-container"><a href="../index.html" class="back-btn">← Retornar à Base</a></div>
    </div>

    <script>
        // --- 1. MOTOR DO MAR E DOS SÓIS ---
        const ambCanvas = document.getElementById('ambient-canvas');
        const ambCtx = ambCanvas.getContext('2d');
        const charBox = document.getElementById('char-box');
        
        let ambTime = 0, wavesPattern;
        let isTranslating = false; // Controle de animação do 7º sol
        
        // Pequenos sóis de fundo
        const smallSuns = [];
        for (let i = 0; i < 6; i++) {
            smallSuns.push({
                x: Math.random(),
                y: Math.random() * 0.3 + 0.05, // Parte de cima
                size: Math.random() * 10 + 10
            });
        }

        // Bolinhas brancas (Orbes) girando
        const orbs = [];
        for(let i = 0; i < 12; i++) {
            orbs.push({
                angle: (Math.PI * 2 / 12) * i,
                speed: 0.01 + Math.random() * 0.015,
                distanceOffset: Math.random() * 20 - 10,
                size: Math.random() * 2 + 2
            });
        }

        function resizeAmbient() {
            ambCanvas.width = window.innerWidth;
            ambCanvas.height = window.innerHeight;
            createWavesTexture();
        }
        window.addEventListener('resize', resizeAmbient);

        // Textura do Mar (Preto, tranquilo, linhas cinzas)
        function createWavesTexture() {
            const pCanvas = document.createElement('canvas'); const pCtx = pCanvas.getContext('2d');
            pCanvas.width = 128; pCanvas.height = 128;
            pCtx.fillStyle = '#000000'; pCtx.fillRect(0, 0, 128, 128); // Água preta
            pCtx.strokeStyle = '#222222'; pCtx.lineWidth = 1; // Contorno cinza escuro
            
            pCtx.beginPath();
            for (let i = 0; i < 64; i++) {
                pCtx.moveTo(0, i * 4);
                // Ondas bem mais tranquilas e retas
                for (let x = 0; x <= 128; x += 8) {
                    pCtx.lineTo(x, i * 4 + Math.sin(x * 0.05 + i * 0.1) * 1.5);
                }
            }
            pCtx.stroke();
            wavesPattern = ambCtx.createPattern(pCanvas, 'repeat');
        }

        function drawAmbient() {
            ambCtx.fillStyle = '#050505'; 
            ambCtx.fillRect(0, 0, ambCanvas.width, ambCanvas.height);

            // Desenhar os 6 pequenos sóis no fundo
            smallSuns.forEach(sun => {
                ambCtx.beginPath();
                ambCtx.arc(sun.x * ambCanvas.width, sun.y * ambCanvas.height, sun.size, 0, Math.PI * 2);
                ambCtx.fillStyle = '#000000';
                ambCtx.shadowColor = 'rgba(255, 255, 255, 0.3)';
                ambCtx.shadowBlur = 15;
                ambCtx.fill();
                ambCtx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ambCtx.lineWidth = 1;
                ambCtx.stroke();
                ambCtx.shadowBlur = 0; // Reset
            });

            // Localizar o 7º Sol Grande atrás do texto
            const boxRect = charBox.getBoundingClientRect();
            const cx = boxRect.left + boxRect.width / 2;
            const cy = boxRect.top + boxRect.height / 2;
            const baseRadius = Math.max(boxRect.width, boxRect.height) / 1.6;

            // Chamas do 7º Sol (Ondulação)
            ambCtx.beginPath();
            for(let a = 0; a <= Math.PI * 2.1; a += 0.05) {
                // Se estiver traduzindo, a chama fica agressiva e gira mais rápido
                let waveIntensity = isTranslating ? 30 : 8;
                let speedMultiplier = isTranslating ? 15 : 3;
                let wave = Math.sin(a * 12 + ambTime * speedMultiplier) * waveIntensity;
                
                let r = baseRadius + wave;
                let x = cx + Math.cos(a) * r;
                let y = cy + Math.sin(a) * r;
                
                if (a === 0) ambCtx.moveTo(x, y);
                else ambCtx.lineTo(x, y);
            }
            ambCtx.closePath();
            ambCtx.fillStyle = '#000000';
            ambCtx.shadowColor = '#ffffff';
            ambCtx.shadowBlur = isTranslating ? 60 : 25; // Brilho aumenta na tradução
            ambCtx.fill();
            ambCtx.shadowBlur = 0; // Reset

            // Bolinhas Perfeitamente Brancas Girando
            orbs.forEach(orb => {
                orb.angle += isTranslating ? orb.speed * 4 : orb.speed; // Acelera se traduzindo
                let orbRadius = baseRadius + 30 + orb.distanceOffset + (isTranslating ? 20 : 0);
                let oX = cx + Math.cos(orb.angle) * orbRadius;
                let oY = cy + Math.sin(orb.angle) * orbRadius;

                ambCtx.beginPath();
                ambCtx.arc(oX, oY, orb.size, 0, Math.PI * 2);
                ambCtx.fillStyle = '#ffffff';
                ambCtx.fill();
            });

            // Oceano Menor (parte debaixo da tela)
            let seaLevel = ambCanvas.height * 0.85; // Mar bem pra baixo
            ambCtx.save();
            ambCtx.beginPath(); 
            ambCtx.rect(0, seaLevel, ambCanvas.width, ambCanvas.height - seaLevel); 
            ambCtx.clip();
            ambCtx.fillStyle = wavesPattern;
            ambCtx.translate(ambTime * 0.3, 0); // Movimento calmo da água
            ambCtx.fillRect(-ambCanvas.width, -ambCanvas.height, ambCanvas.width * 2, ambCanvas.height * 2);
            ambCtx.restore();

            ambTime += 0.01;
            requestAnimationFrame(drawAmbient);
        }
        
        resizeAmbient(); 
        drawAmbient();

        // --- 2. GERAÇÃO DO TEXTO RÚNICO ---
        const runes = ['ᚦ', 'ᚧ', 'ᚨ', 'ᛒ', 'ᛃ', 'ᛄ', 'ᛅ', 'ᛆ', 'ᛇ', 'ᛈ', 'ᛉ'];
        const container = document.getElementById('sunny-soul-core');
        container.querySelectorAll('p').forEach(p => {
            const txt = p.textContent; p.textContent = '';
            for (let i = 0; i < txt.length; i++) {
                const span = document.createElement('span'); span.classList.add('sunny-letter');
                span.dataset.real = txt[i]; span.textContent = txt[i] === ' ' ? ' ' : runes[Math.floor(Math.random() * runes.length)];
                p.appendChild(span);
            }
        });

        // --- 3. ANIMAÇÃO DE TRADUÇÃO (ECLIPSE) ---
        document.getElementById('mass-btn').addEventListener('click', () => {
            if(isTranslating) return; // Evita duplo clique
            isTranslating = true;
            const voidDarkness = document.getElementById('void');

            // 1. O sol se agita (isTranslating já é true)
            
            // 2. A tela escurece após as chamas oscilarem um pouco
            setTimeout(() => {
                voidDarkness.style.opacity = '1'; 
                
                // 3. Enquanto a tela está preta, as letras mudam e recebem a classe de brilho negro
                setTimeout(() => {
                    container.querySelectorAll('.sunny-letter').forEach(l => {
                        l.textContent = l.dataset.real;
                        l.classList.add('black-flash'); // Aplica o brilho preto explosivo
                    });

                    // 4. A luz retorna e revela o texto brilhando em preto
                    voidDarkness.style.opacity = '0';
                    isTranslating = false; // Sol volta a se acalmar
                    
                    // 5. O brilho preto se dissipa, deixando o texto branco perfeitamente legível
                    setTimeout(() => {
                        container.querySelectorAll('.sunny-letter').forEach(l => {
                            l.classList.remove('black-flash');
                            l.classList.add('revealed');
                        });
                    }, 1500); // Duração do brilho negro intenso

                }, 1200); // Tempo na escuridão
            }, 1000); // Tempo do sol ondulando forte antes de apagar
        });
    </script>
</body>
</html>
