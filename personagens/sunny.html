<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alma - Sunless</title>
    <link rel="stylesheet" href="../css/style.css?v=4">
    
    <style>
        /* Fundo do próprio Vazio */
        body { 
            background-color: #020202 !important; 
            overflow-x: hidden;
            position: relative;
        }

        /* --- SOMBRAS CIRCULANDO PELA TELA --- */
        .ambient-shadow {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.95) 0%, rgba(5, 5, 5, 0) 70%);
            filter: blur(40px);
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: multiply;
        }
        .shadow-1 {
            width: 600px; height: 600px;
            top: -10%; left: -10%;
            animation: rotateShadow1 25s infinite ease-in-out;
        }
        .shadow-2 {
            width: 500px; height: 500px;
            bottom: -10%; right: -10%;
            animation: rotateShadow2 30s infinite ease-in-out;
        }
        @keyframes rotateShadow1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(150px, 100px) scale(1.2); }
        }
        @keyframes rotateShadow2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-100px, -150px) scale(1.1); }
        }

        /* --- CONTAINER E LAYOUT --- */
        .content-wrapper {
            position: relative;
            z-index: 10; /* Garante que o texto fique acima das sombras de fundo */
            max-width: 750px; 
            width: 100%; 
            margin: 0 auto; 
            padding-top: 10vh;
        }
        .character-container {
            display: flex;
            gap: 25px;
            background: rgba(4, 4, 4, 0.98);
            border: 1px solid #111;
            padding: 25px;
            border-radius: 4px;
            box-shadow: 0 0 35px rgba(0, 0, 0, 1);
            align-items: center;
        }
        .character-img {
            width: 180px; height: 240px;
            object-fit: cover;
            border: 1px solid #1a1a1a;
            border-radius: 2px;
            filter: grayscale(80%) brightness(50%) contrast(120%);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            transition: all 0.5s ease;
        }
        .character-container:hover .character-img {
            filter: grayscale(20%) brightness(75%);
            border-color: #333;
        }

        /* --- ESTILIZAÇÃO DO FEITIÇO CUSTOMIZADO DO SUNNY --- */
        .sunny-rune-text p {
            margin: 12px 0;
            font-family: monospace;
            font-size: 16px;
            min-height: 20px;
        }
        /* Letra Rúnica inicial */
        .sunny-letter {
            display: inline-block;
            font-family: serif;
            color: #151515; /* Runa quase invisível na escuridão */
            transition: color 0.1s;
        }
        /* 1. Animação de estilhaço começando (Cinza Escuro) */
        .sunny-letter.shattering {
            color: #3a3a3a !important;
            text-shadow: 0 0 5px #222;
            transform: scale(1.1);
        }
        /* 2. Texto final revelado */
        .sunny-letter.revealed {
            color: #8c8c8c !important;
            text-shadow: 0 0 8px #222, 0 0 15px #000 !important;
            animation: pulseFinalText 4s infinite ease-in-out;
        }

        /* Poeira de fragmento de runa (Totalmente Preta) */
        .black-dust {
            position: fixed;
            width: 3px; height: 3px;
            background: #000 !important;
            box-shadow: 0 0 4px #000, 0 0 8px #111 !important;
            pointer-events: none;
            z-index: 100;
            border-radius: 50%;
        }

        /* Canvas da Poeira Ambiente Mágica (Preta e Cinza) */
        #ambient-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="ambient-shadow shadow-1"></div>
    <div class="ambient-shadow shadow-2"></div>
    <canvas id="ambient-canvas"></canvas>

    <div class="content-wrapper">
        <nav class="nav-menu" style="display: flex; gap: 20px; margin-bottom: 30px; justify-content: flex-start;">
            <a href="../index.html" class="nav-link" style="color: #666; text-decoration: none; font-family: monospace;">[ Início ]</a>
            <a href="../personagens.html" class="nav-link" style="color: #666; text-decoration: none; font-family: monospace;">[ Personagens ]</a>
            <a href="#" class="nav-link" style="color: #fff; text-decoration: none; font-family: monospace; text-shadow: 0 0 5px #333;">[ Sunny ]</a>
        </nav>

        <h1 style="color: #222; font-family: serif; letter-spacing: 5px; margin-bottom: 20px; text-shadow: 0 0 12px #000; text-align: center;">REGISTRO DE ALMA</h1>

        <div class="character-container">
            <img src="../img/sunless.jpg" alt="Sunless" class="character-img">
            
            <div class="sunny-rune-text" id="sunny-soul-core">
                <p>Nome Verdadeiro: Perdido da Luz</p>
                <p>Nome: Sunless</p>
                <p>Rank: Adormecido</p>
                <p>Classe: Terror</p>
                <p>Atributos: [Mestre das Sombras]</p>
            </div>
        </div>
    </div>

    <script>
        // --- 1. SISTEMA DE POEIRA AMBIENTE (Preta e Cinza) ---
        const canvas = document.getElementById('ambient-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class AmbientParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * -0.5 - 0.1; // Sobe lentamente
                // Alterna entre tons de preto puro e cinza escuro
                this.color = Math.random() > 0.5 ? '#000000' : '#2a2a2a';
                this.alpha = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 4;
                ctx.shadowColor = '#000';
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 45; i++) { particles.push(new AmbientParticle()); }

        function animateAmbient() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateAmbient);
        }
        animateAmbient();


        // --- 2. MOTOR DE TRADUÇÃO RÚNICA DO SUNNY ---
        const runes = ['ᚦ', 'ᚧ', 'ᚨ', 'ᛒ', 'ᛃ', 'ᛄ', 'ᛅ', 'ᛆ', 'ᛇ', 'ᛈ', 'ᛉ', 'ᛊ', 'ᛋ', 'ᛏ', 'ᛐ', 'ᛑ', 'ᛒ', 'ᛓ'];
        const container = document.getElementById('sunny-soul-core');
        const paragraphs = container.querySelectorAll('p');

        paragraphs.forEach(p => {
            const originalText = p.textContent;
            p.textContent = ''; // Limpa para reconstruir letra por letra
            
            for (let i = 0; i < originalText.length; i++) {
                const span = document.createElement('span');
                span.classList.add('sunny-letter');
                span.dataset.real = originalText[i];
                // Se for espaço, não vira runa
                span.textContent = originalText[i] === ' ' ? ' ' : runes[Math.floor(Math.random() * runes.length)];
                p.appendChild(span);
            }
        });

        // Função para criar partículas de estilhaço totalmente pretas
        function spawnBlackDust(x, y) {
            for (let i = 0; i < 3; i++) {
                const dust = document.createElement('div');
                dust.classList.add('black-dust');
                dust.style.left = x + 'px';
                dust.style.top = y + 'px';
                
                const speedX = (Math.random() - 0.5) * 4;
                const speedY = (Math.random() - 0.5) * 4 - 2;
                let currentX = x;
                let currentY = y;
                let opacity = 1;

                document.body.appendChild(dust);

                const moveDust = setInterval(() => {
                    currentX += speedX;
                    currentY += speedY;
                    opacity -= 0.05;
                    dust.style.left = currentX + 'px';
                    dust.style.top = currentY + 'px';
                    dust.style.opacity = opacity;

                    if (opacity <= 0) {
                        clearInterval(moveDust);
                        dust.remove();
                    }
                }, 30);
            }
        }

        // Ativa a quebra das runas sequencialmente
        setTimeout(() => {
            const allLetters = container.querySelectorAll('.sunny-letter');
            
            allLetters.forEach((letter, index) => {
                if (letter.textContent === ' ') return; // Pula espaços

                setTimeout(() => {
                    // Fase 1: Começa a estilhaçar (Fica Cinza Escuro)
                    letter.classList.add('shattering');
                    
                    // Dispara a poeira preta pegando a posição da letra na tela
                    const rect = letter.getBoundingClientRect();
                    spawnBlackDust(rect.left + (rect.width/2), rect.top + (rect.height/2));

                    // Fase 2: Revela
