<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alma - Lorde das Sombras</title>
    <link rel="stylesheet" href="../css/style.css?v=7">
    
    <style>
        body { 
            background-color: #010101 !important; 
            overflow-x: hidden;
            position: relative;
            margin: 0; padding: 0;
        }

        /* --- TEIAS DE ESSÊNCIA NEGRA NOS QUATRO CANTOS --- */
        .essence-thread {
            position: fixed;
            width: 200px; height: 200px;
            pointer-events: none;
            z-index: 20;
            opacity: 0.7;
            animation: threadPulse 5s infinite ease-in-out;
        }
        .thread-tl { top: 0; left: 0; border-left: 3px solid #000; border-top: 3px solid #000; background: radial-gradient(circle at top left, rgba(0,0,0,1) 10%, rgba(15,15,15,0.3) 40%, transparent 70%); box-shadow: -10px -10px 30px #000; }
        .thread-tr { top: 0; right: 0; border-right: 3px solid #000; border-top: 3px solid #000; background: radial-gradient(circle at top right, rgba(0,0,0,1) 10%, rgba(15,15,15,0.3) 40%, transparent 70%); box-shadow: 10px -10px 30px #000; }
        .thread-bl { bottom: 0; left: 0; border-left: 3px solid #000; border-bottom: 3px solid #000; background: radial-gradient(circle at bottom left, rgba(0,0,0,1) 10%, rgba(15,15,15,0.3) 40%, transparent 70%); box-shadow: -10px 10px 30px #000; }
        .thread-br { bottom: 0; right: 0; border-right: 3px solid #000; border-bottom: 3px solid #000; background: radial-gradient(circle at bottom right, rgba(0,0,0,1) 10%, rgba(15,15,15,0.3) 40%, transparent 70%); box-shadow: 10px 10px 30px #000; }

        @keyframes threadPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; filter: blur(0px); }
            50% { transform: scale(1.05); opacity: 0.9; filter: blur(1px); }
        }

        /* --- SOMBRAS VAGAS QUE SE CURVAM/CUMPRIMENTAM --- */
        .ambient-shadow {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.98) 0%, rgba(10, 10, 10, 0.4) 50%, rgba(0, 0, 0, 0) 80%);
            filter: blur(50px);
            pointer-events: none;
            z-index: 1;
        }
        /* Shadow 1: Sombra Superior Esquerda (Faz reverência em diagonal) */
        .shadow-1 {
            width: 650px; height: 650px;
            top: -15%; left: -15%;
            animation: shadowBowLeft 20s infinite ease-in-out;
        }
        /* Shadow 2: Sombra Inferior Direita (Gira e expande saudando) */
        .shadow-2 {
            width: 550px; height: 550px;
            bottom: -10%; right: -10%;
            animation: shadowBowRight 25s infinite ease-in-out;
        }

        @keyframes shadowBowLeft {
            0%, 100% { transform: translate(0, 0) scale(1); }
            45%, 55% { transform: translate(80px, 80px) scale(1.15) skewX(5deg); } /* Curvando-se para o leitor */
        }
        @keyframes shadowBowRight {
            0%, 100% { transform: translate(0, 0) scale(1); }
            40%, 60% { transform: translate(-70px, -50px) scale(1.2) skewY(-4deg); } /* Inclinando-se para o centro */
        }

        /* --- CONTAINER E LAYOUT RESPONSIVO --- */
        .content-wrapper {
            position: relative;
            z-index: 10;
            max-width: 750px; width: 100%; margin: 0 auto; 
            padding: 10vh 20px 40px 20px;
            box-sizing: border-box;
        }
        .character-container {
            display: flex; gap: 25px;
            background: rgba(3, 3, 3, 0.99);
            border: 1px solid #0d0d0d;
            padding: 25px; border-radius: 4px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            align-items: center;
        }

        @media (max-width: 600px) {
            .character-container { flex-direction: column; text-align: center; padding: 20px; }
            .nav-menu { justify-content: center !important; }
        }

        .character-img {
            width: 180px; height: 240px; object-fit: cover;
            border: 1px solid #111; border-radius: 2px;
            filter: grayscale(100%) brightness(35%) contrast(130%);
            transition: all 0.6s ease;
        }
        .character-container:hover .character-img,
        .character-container:active .character-img {
            filter: grayscale(40%) brightness(65%) contrast(115%);
            border-color: #222;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        /* --- CONTROLE DAS SOMBRAS DAS LETRAS --- */
        .sunny-rune-text { user-select: none; -webkit-user-select: none; cursor: pointer; width: 100%; }
        .sunny-rune-text p { margin: 12px 0; font-family: monospace; font-size: 16px; min-height: 20px; }
        
        .sunny-letter { 
            display: inline-block; 
            font-family: serif; 
            /* 1. Estado Inicial: Sombra Disforme sem forma */
            color: transparent;
            text-shadow: 0 0 14px rgba(0, 0, 0, 1), 0 0 20px rgba(0, 0, 0, 1);
            filter: blur(6px);
            transform: scale(1.1);
            transition: all 0.3s ease;
        }

        /* 2. Estado: Tentativa Rúnica padrão do Feitiço */
        .sunny-letter.spell-attempt {
            color: #1a1a1a !important;
            text-shadow: 0 0 5px #000 !important;
            filter: blur(0px);
            transform: scale(1);
        }
        
        /* 3. Estado: Rejeição e Tecitura da Essência Negra própria do Sunny */
        .sunny-letter.weaving-essence { 
            color: #000000 !important;
            text-shadow: 0 0 12px #000000, 0 0 25px #111111 !important;
            transform: scale(1.3) translateY(-2px);
            filter: blur(1px);
        }
        
        /* 4. Estado Final: Revelado pela Essência Escura */
        .sunny-letter.revealed { 
            color: #6a6a6a !important; 
            text-shadow: 0 0 8px #000000, 0 0 15px rgba(0, 0, 0, 0.8) !important;
            transform: scale(1) translateY(0);
            filter: blur(0px);
        }

        /* Fragmentos físicos da essência de sombra sendo expelidos */
        .shadow-strand {
            position: fixed; pointer-events: none; z-index: 100; border-radius: 50%;
            background: #000000 !important;
            box-shadow: 0 0 6px #000, 0 0 12px #111 !important;
        }

        #ambient-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <div class="essence-thread thread-tl"></div>
    <div class="essence-thread thread-tr"></div>
    <div class="essence-thread thread-bl"></div>
    <div class="essence-thread thread-br"></div>

    <div class="ambient-shadow shadow-1"></div>
    <div class="ambient-shadow shadow-2"></div>
    <canvas id="ambient-canvas"></canvas>

    <div class="content-wrapper">
        <nav class="nav-menu" style="display: flex; gap: 20px; margin-bottom: 30px; justify-content: flex-start;">
            <a href="../index.html" class="nav-link" style="color: #333; text-decoration: none; font-family: monospace;">[ Início ]</a>
            <a href="../personagens.html" class="nav-link" style="color: #333; text-decoration: none; font-family: monospace;">[ Personagens ]</a>
            <a href="#" class="nav-link" style="color: #666; text-decoration: none; font-family: monospace; text-shadow: 0 0 5px #000;">[ Sunny ]</a>
        </nav>

        <h1 style="color: #111; font-family: serif; letter-spacing: 5px; margin-bottom: 20px; text-shadow: 0 0 15px #000; text-align: center;">REGISTRO DE ALMA</h1>

        <div class="character-container">
            <img src="../imagens/Sunny.jpg" alt="Sunless" class="character-img">
            
            <div class="sunny-rune-text" id="sunny-soul-core">
                <p>Nome Verdadeiro: Perdido da Luz</p>
                <p>Nome: Sunless</p>
                <p>Rank: Soberano</p>
                <p>Classe: Divina</p>
                <p>Atributos: [Lorde das Sombras], [Mestre das Sombras], [Encarnação das Trevas]</p>
            </div>
        </div>
    </div>

    <script>
        // --- 1. POEIRA DE PNEUMA E NÉVOA AMBIENTE (Preto e Cinza) ---
        const canvas = document.getElementById('ambient-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        class ShadowParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * -0.4 - 0.1;
                this.color = Math.random() > 0.6 ? '#000000' : '#1c1c1c';
                this.alpha = Math.random() * 0.6 + 0.2;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.y < 0) { this.y = canvas.height; this.x = Math.random() * canvas.width; }
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 4; ctx.shadowColor = '#000';
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for (let i = 0; i < 40; i++) { particles.push(new ShadowParticle()); }
        function animateAmbient() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateAmbient);
        }
        animateAmbient();

        // --- 2. SISTEMA REBELDE DE TRADUÇÃO DAS SOMBRAS ---
        const runes = ['ᚦ', 'ᚧ', 'ᚨ', 'ᛒ', 'ᛃ', 'ᛄ', 'ᛅ', 'ᛆ', 'ᛇ', 'ᛈ', 'ᛉ', 'ᛊ', 'ᛋ', 'ᛏ', 'ᛐ', 'ᛑ', 'ᛒ', 'ᛓ'];
        const container = document.getElementById('sunny-soul-core');
        const paragraphs = container.querySelectorAll('p');

        paragraphs.forEach(p => {
            const originalText = p.textContent; p.textContent = '';
            for (let i = 0; i < originalText.length; i++) {
                const span = document.createElement('span'); 
                span.classList.add('sunny-letter');
                span.dataset.real = originalText[i];
                // Inicia como caracter oculto, sem formato
                span.textContent = originalText[i] === ' ' ? ' ' : runes[Math.floor(Math.random() * runes.length)];
                p.appendChild(span);
            }
        });

        // Libera fragmentos e fios de essência preta pura tridimensional
        function spawnShadowStrands(x, y) {
            for (let i = 0; i < 4; i++) {
                const strand = document.createElement('div');
                strand.classList.add('shadow-strand');
                const size = Math.random() * 4 + 2;
                strand.style.width = size + 'px'; strand.style.height = size + 'px';
                strand.style.left = x + 'px'; strand.style.top = y + 'px';
                
                const speedX = (Math.random() - 0.5) * 5;
                const speedY = (Math.random() - 0.5) * 5;
                let cX = x, cY = y, op = 1;
                document.body.appendChild(strand);

                const move = setInterval(() => {
                    cX += speedX; cY += speedY; op -= 0.05;
                    strand.style.left = cX + 'px'; strand.style.top = cY + 'px'; strand.style.opacity = op;
                    if (op <= 0) { clearInterval(move); strand.remove(); }
                }, 25);
            }
        }

        // MOTOR DE EVOLUÇÃO DAS SOMBRAS (Narrativa visual contínua)
        function evolveShadowToText(letter) {
            if (letter.textContent === ' ' || letter.classList.contains('revealed') || letter.classList.contains('spell-attempt') || letter.classList.contains('weaving-essence')) return;

            // Passo 1: Transforma a sombra sem forma nas runas do Feitiço do Pesadelo
            letter.classList.add('spell-attempt');
            
            // Passo 2: Quase instantaneamente, Sunny rejeita o feitiço e tece com essência negra
            setTimeout(() => {
                letter.classList.remove('spell-attempt');
                letter.classList.add('weaving-essence');
                
                const rect = letter.getBoundingClientRect();
                spawnShadowStrands(rect.left + (rect.width/2) + window.scrollX, rect.top + (rect.height/2) + window.scrollY);

                // Passo 3: Fixa o texto final na cor de cinza sombrio estável
                setTimeout(() => {
                    letter.classList.remove('weaving-essence');
                    letter.textContent = letter.dataset.real;
                    letter.classList.add('revealed');
                }, 300); // Tempo moldando a própria essência

            }, 150); // Tempo que ele leva para rejeitar o design padrão
        }

        function triggerFullCascade() {
            container.querySelectorAll('.sunny-letter').forEach((l, idx) => { 
                setTimeout(() => evolveShadowToText(l), idx * 35); 
            });
        }

        // --- INTEGRAÇÃO TOTAL DESKTOP & CONTROLE TÁTIL ---
        container.querySelectorAll('.sunny-letter').forEach(l => { 
            l.addEventListener('mouseenter', () => evolveShadowToText(l)); 
        });
        container.addEventListener('click', triggerFullCascade);
        container.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            if (el && el.classList.contains('sunny-letter')) { evolveShadowToText(el); }
        }, { passive: false });
    </script>
</body>
</html>
