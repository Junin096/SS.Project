<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alma - Nephis</title>
    <link rel="stylesheet" href="../css/style.css?v=2">
    <style>
        body { background-color: #080303 !important; } /* Tom levemente avermelhado de brasa escura */
        .character-container {
            display: flex;
            gap: 25px;
            background: rgba(12, 8, 8, 0.95);
            border: 1px solid #2a1515;
            padding: 25px;
            border-radius: 4px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.9);
            align-items: center;
        }
        .character-img {
            width: 180px;
            height: 240px;
            object-fit: cover;
            border: 1px solid #4a2222;
            border-radius: 2px;
            filter: grayscale(30%) brightness(80%);
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
            transition: all 0.5s ease;
        }
        .character-img:hover {
            filter: grayscale(0%) brightness(100%);
            border-color: #a33;
            box-shadow: 0 0 20px rgba(255, 100, 100, 0.15);
        }
        .spell-description { background: none !important; border: none !important; padding: 0 !important; box-shadow: none !important; }
        .rune-char { color: #3a1a1a !important; } /* Runas cor de brasa apagada */
        .real-char { color: #dfc5c5 !important; text-shadow: 0 0 8px #a33 !important; } /* Texto brilhando de leve */
    </style>
</head>
<body>

    <div style="max-width: 750px; width: 100%; margin: 0 auto; padding-top: 10vh;">
        <nav class="nav-menu" style="display: flex; gap: 20px; margin-bottom: 30px; justify-content: flex-start;">
            <a href="../index.html" class="nav-link" style="color: #888; text-decoration: none; font-family: monospace;">[ Início ]</a>
            <a href="../personagens.html" class="nav-link" style="color: #888; text-decoration: none; font-family: monospace;">[ Personagens ]</a>
            <a href="#" class="nav-link" style="color: #fff; text-decoration: none; font-family: monospace;">[ Nephis ]</a>
        </nav>

        <h1 style="color: #4a2222; font-family: serif; letter-spacing: 5px; margin-bottom: 20px; text-shadow: 0 0 10px #000;">REGISTRO DE ALMA</h1>

        <div class="character-container">
            <img src="../img/nephis.jpg" alt="Nephis" class="character-img">
            
            <div class="spell-description" id="nephis-text">
                <p>Nome Verdadeiro: Estrela da Mudança</p>
                <p>Nome: Nephis</p>
                <p>Rank: Adormecida</p>
                <p>Classe: Monstro</p>
                <p>Atributos: [Chama da Destruição], [Inextinguível]</p>
            </div>
        </div>
    </div>

    <script src="../js/spell.js?v=2"></script>
    <script>
        if (typeof initSpellText === 'function') { initSpellText('nephis-text'); }
    </script>
</body>
</html>
