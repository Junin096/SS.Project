<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alma - Nephis</title>
    <link rel="stylesheet" href="../css/style.css?v=6">
    
    <style>
        body { 
            background-color: #050505 !important; 
            overflow-x: hidden;
            position: relative;
            margin: 0; padding: 0;
            transition: transform 0.1s ease; /* Permite o efeito de tremer a tela */
        }

        /* --- CHAMAS BRANCAS ONDULADAS DE FUNDO --- */
        .white-fire-bg {
            position: fixed;
            bottom: -100px; left: 50%;
            transform: translateX(-50%);
            width: 120vw; height: 60vh;
            background: radial-gradient(ellipse at bottom, rgba(255, 255, 255, 0.15) 0%, rgba(200, 200, 200, 0.05) 40%, rgba(0, 0, 0, 0) 70%);
            filter: blur(30px);
            pointer-events: none;
            z-index: 1;
            animation: waveFire 6s infinite ease-in-out;
        }

        @keyframes waveFire {
            0%, 100% { transform: translateX(-50%) scaleY(1) skewX(0deg); }
            50% { transform: translateX(-48%) scaleY(1.2) skewX(4deg); filter: blur(25px); }
        }

        /* --- LAYOUT RESPONSIVO --- */
        .content-wrapper {
            position: relative;
            z-index: 10;
            max-width: 750px; width: 100%; margin: 0 auto; 
            padding: 10vh 20px 40px 20px;
            box-sizing: border-box;
        }
        .character-container {
            display: flex; gap: 25px;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #222;
            padding: 25px; border-radius: 4px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.03);
            align-items: center;
        }

        @media (max-width: 600px) {
            .character-container { flex-direction: column; text-align: center; padding: 20px; }
            .nav-menu { justify-content: center !important; }
        }

        .character-img {
            width: 180px; height: 240px; object-fit: cover;
            border: 1px solid #333; border-radius: 2px;
            filter: grayscale(50%) brightness(70%) contrast(110%);
            transition: all 0.5s ease;
        }
        .character-container:hover .character-img,
        .character-container:active .character-img {
            filter: grayscale(0%) brightness(95%) contrast(120%);
            border-color: #fff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
        }

        /* --- ONDULAÇÃO DE CALOR E LETRAS RÚNICAS --- */
        .nephis-rune-text { user-select: none; -webkit-user-select: none; cursor: pointer; width: 100%; }
        .nephis-rune-text p { margin: 12px 0; font-family: monospace; font-size: 16px; min-height: 20px; }
        
        .nephis-letter { 
            display: inline-block; 
            font-family: serif; 
            color: #222; 
            transition: color 0.1s;
            /* Efeito constante de ondulação pelo calor do ar */
            animation: heatHaze 2s infinite ease-in-out;
            animation-delay: calc(var(--char-index, 0) * 0.05s);
        }

        @keyframes heatHaze {
            0%, 100% { transform: translateY(0) skewX(0deg); }
            50% { transform: translateY(-1.5px) skewX(2deg); }
        }
        
        /* 1. Estágio: Irradia Branco Absoluto ao explodir */
        .nephis-letter.shattering { 
            color: #ffffff !important; 
            text-shadow: 0 0 15px #ffffff, 0 0 30px #ffffff, 0 0 45px #ffffff !important; 
            transform: scale(1.3) translateY(-4px) !important;
        }
        
        /* 2. Estágio: Texto Revelado Alvo Puro */
        .nephis-letter.revealed { 
            color: #f5f5f5 !important; 
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6) !important; 
        }

        /* Elemento dinâmico de fagulha injetado por JS */
        .fire-spark {
            position: fixed; pointer-events: none; z-index: 100; border-radius: 50%;
            background: #ffffff !important;
            box-shadow: 0 0 6px #ffffff, 0 0 12px #e0e0e0 !important;
        }

        #ambient-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 5; }

        /* Classe temporária disparada para tremer a tela */
        .screen-shake {
            animation: shakeEffect 0.25s linear;
        }
        @keyframes shakeEffect {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-4px, 3px); }
            40% { transform: translate(4px, -3px); }
            60% { transform: translate(-3px, -2px); }
            80% { transform: translate(3px, 2px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <div class="white-fire-bg"></div>
    <canvas id="ambient-canvas"></canvas>

    <div class="content-wrapper">
        <nav class="nav-menu" style="display: flex; gap: 20px; margin-bottom: 30px; justify-content: flex-start;">
            <a href="../index.html" class="nav-link" style="color: #444; text-decoration: none; font-family: monospace;">[ Início ]</a>
            <a href="../personagens.html" class="nav-link" style="color: #444; text-decoration: none; font-family: monospace;">[ Personagens ]</a>
            <a href="#" class="nav-link" style="color: #fff; text-decoration: none; font-family: monospace; text-shadow: 0 0 8px #fff;">[ Nephis ]</a>
        </nav>

        <h1 style="color: #ffffff; font-family: serif; letter-spacing: 5px; margin-bottom: 20px; text-shadow: 0 0 15px rgba(255,255,255,0.3); text-align: center;">REGISTRO DE ALMA</h1>

        <div class="character-container">
            <img src="../imagens/Nephis.jpg" alt="Nephis" class="character-img">
            
            <div class="nephis-rune-text" id="nephis-soul-core">
                <p>Nome Verdadeiro: Estrela da Mudança</p>
                <p>Nome: Nephis</p>
                <p>Rank: Adormecida</p>
                <p>Classe: Monstro</p>
                <p>Atributos: [Chama da Destruição], [Estrela da Ruína], [Inextinguível]</p>
            </div>
        </div>
    </div>

    <script>
        // --- 1. SCRIPT DE CENTELHAS E FAGULHAS BRANCAS AMBIENTES ---
        const canvas = document.getElementById('ambient-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        class AmbientSpark {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1.5 - 0.75;
                this.speedY = Math.random() * -2.5 - 0.5; // Sobem rápido como chamas intensas
                this.alpha = Math.random() * 0.5 + 0.5;
            }
            update() {
                this.x += this.speedX + Math.sin(this.y / 30) * 0.3; // Ondula levemente ao subir
                this.y += this.speedY;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 6;
                ctx.shadowColor = '#fff';
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Gera as fagulhas contínuas de fundo
        function generateSparks() {
            if (particles.length < 40) { particles.push(new AmbientSpark()); }
        }

        function animateAmbient() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            generateSparks();
            particles.forEach((p, idx) => {
                p.update(); p.draw();
                if (p.y < -10 || p.x < 0 || p.x > canvas.width) { particles.splice(idx, 1); }
            });
            requestAnimationFrame(animateAmbient);
        }
        animateAmbient();

        // --- 2. CONVERSÃO RÚNICA E DISTORÇÃO DE CALOR ---
        const runes = ['ᚦ', 'ᚧ', 'ᚨ', 'ᛒ', 'ᛃ', 'ᛄ', 'ᛅ', 'ᛆ', 'ᛇ', 'ᛈ', 'ᛉ', 'ᛊ', 'ᛋ', 'ᛏ', 'ᛐ', 'ᛑ'];
        const container = document.getElementById('nephis-soul-core');
        const paragraphs = container.querySelectorAll('p');

        let charGlobalCount = 0;
        paragraphs.forEach(p => {
            const originalText = p.textContent; p.textContent = '';
            for (let i = 0; i < originalText.length; i++) {
                const span = document.createElement('span'); 
                span.classList.add('nephis-letter');
                span.style.setProperty('--char-index', charGlobalCount++);
                span.dataset.real = originalText[i];
                span.textContent = originalText[i] === ' ' ? ' ' : runes[Math.floor(Math.random() * runes.length)];
                p.appendChild(span);
            }
        });

        // Efeito físico de explosão e ejeção de faíscas brancas puras
        function triggerWhiteExplosion(x, y) {
            // Treme a tela simulando o impacto do calor quebrando o ar
            document.body.classList.remove('screen-shake');
            void document.body.offsetWidth; // Truque para resetar animação CSS
            document.body.classList.add('screen-shake');

            for (let i = 0; i < 8; i++) {
                const spark = document.createElement('div'); 
                spark.classList.add('fire-spark');
                
                const size = Math.random() * 4 + 2;
                spark.style.width = size + 'px';
                spark.style.height = size + 'px';
                spark.style.left = x + 'px'; 
                spark.style.top = y + 'px';
                
                // Vetores de explosão rápidos e caóticos
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 6 + 4;
                const speedX = Math.cos(angle) * velocity;
                const speedY = Math.sin(angle) * velocity - 2; 
                
                let cX = x, cY = y, op = 1;
                document.body.appendChild(spark);

                const move = setInterval(() => {
                    cX += speedX; cY += speedY; op -= 0.05;
                    spark.style.left = cX + 'px'; 
                    spark.style.top = cY + 'px'; 
                    spark.style.opacity = op;
                    if (op <= 0) { clearInterval(move); spark.remove(); }
                }, 20);
            }
        }

        function shatterLetter(letter) {
            if (letter.textContent === ' ' || letter.classList.contains('revealed') || letter.classList.contains('shattering')) return;
            
            letter.classList.add('shattering');
            const rect = letter.getBoundingClientRect();
            
            // Dispara faíscas individuais no modo varredura de dedo
            triggerWhiteExplosion(rect.left + (rect.width/2) + window.scrollX, rect.top + (rect.height/2) + window.scrollY);
            
            setTimeout(() => {
                letter.classList.remove('shattering'); 
                letter.textContent = letter.dataset.real; 
                letter.classList.add('revealed');
            }, 150);
        }

        // Cascata apocalíptica ao clicar ou dar um Tap
        function triggerFullCascade() {
            container.querySelectorAll('.nephis-letter').forEach((l, idx) => { 
                setTimeout(() => shatterLetter(l), idx * 20); 
            });
        }

        // --- CONTROLES COMBINADOS DE ACESSIBILIDADE TÁTIL ---
        container.querySelectorAll('.nephis-letter').forEach(l => { 
            l.addEventListener('mouseenter', () => shatterLetter(l)); 
        });
        container.addEventListener('click', triggerFullCascade);
        container.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            if (el && el.classList.contains('nephis-letter')) { shatterLetter(el); }
        }, { passive: false });
    </script>
</body>
</html>
