<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alma - Nephis</title>
    <style>
        body { background-color: #050505 !important; overflow-x: hidden; position: relative; margin: 0; padding: 0; transition: transform 0.1s ease; }
        
        .mass-translate-container { display: flex; justify-content: center; margin-bottom: 25px; margin-top: 20px; }
        .mass-translate-btn {
            background: #111; border: 1px solid #333; padding: 10px 20px; border-radius: 4px;
            color: #aaa; font-family: monospace; cursor: pointer; display: flex; align-items: center; gap: 10px; z-index: 30; position: relative;
        }
        .mass-translate-btn:hover { border-color: #fff; color: #fff; }

        .white-fire-bg { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); width: 120vw; height: 60vh; background: radial-gradient(ellipse at bottom, rgba(255,255,255,0.12) 0%, transparent 70%); filter: blur(30px); pointer-events: none; z-index: 1; animation: waveFire 6s infinite ease-in-out; }
        @keyframes waveFire { 0%, 100% { transform: translateX(-50%) scaleY(1); } 50% { transform: translateX(-49%) scaleY(1.15); } }

        .content-wrapper { position: relative; z-index: 10; max-width: 750px; width: 100%; margin: 0 auto; padding: 5vh 20px 40px 20px; box-sizing: border-box; }
        .character-container { display: flex; gap: 25px; background: rgba(10,10,10,0.96); border: 1px solid #222; padding: 25px; border-radius: 4px; align-items: center; position: relative; transition: all 0.6s ease; }
        @media (max-width: 600px) { .character-container { flex-direction: column; text-align: center; } }
        
        body.burned-borders .character-container { border-color: #ffffff !important; box-shadow: 0 0 35px rgba(255,255,255,0.25), inset 0 0 15px rgba(255,255,255,0.1); }
        .character-img { width: 180px; height: 240px; object-fit: cover; border: 1px solid #333; filter: grayscale(50%) brightness(60%); }

        .nephis-rune-text p { margin: 12px 0; font-family: monospace; font-size: 16px; min-height: 20px; color: #777; }
        .nephis-letter { display: inline-block; font-family: serif; color: #252525; animation: heatHaze 2s infinite ease-in-out; animation-delay: calc(var(--char-index, 0) * 0.04s); }
        @keyframes heatHaze { 0%, 100% { transform: translateY(0) skewX(0deg); } 50% { transform: translateY(-1.5px) skewX(2deg); } }
        
        .nephis-letter.shattering { color: #ffffff !important; text-shadow: 0 0 15px #fff, 0 0 30px #fff !important; transform: scale(1.3); }
        .nephis-letter.revealed { color: #f5f5f5 !important; text-shadow: 0 0 8px rgba(255,255,255,0.5) !important; animation: none; }

        .fire-spark { position: fixed; pointer-events: none; z-index: 100; border-radius: 50%; background: #fff; box-shadow: 0 0 8px #fff; }
        #ambient-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 5; }

        .white-core { position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px #fff, 0 0 40px #fff; opacity: 0; pointer-events: none; z-index: 30; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        @keyframes coreGather { 0% { opacity: 1; transform: translate(var(--mx), var(--my)) scale(1); } 80% { opacity: 1; transform: translate(-50%, -50%) scale(1.6); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(0); filter: blur(4px); } }
        .screen-shake { animation: shake 0.25s linear; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-5px, 3px); } 50% { transform: translate(5px, -3px); } }

        .back-btn-container { display: flex; justify-content: center; margin-top: 40px; z-index: 20; position: relative; }
        .back-btn { background: transparent; border: 1px solid #444; padding: 10px 30px; border-radius: 4px; color: #888; font-family: monospace; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; }
        .back-btn:hover { background: #111; border-color: #fff; color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="white-fire-bg"></div>
    <canvas id="ambient-canvas"></canvas>

    <div class="content-wrapper">
        <div class="mass-translate-container">
            <button class="mass-translate-btn" id="mass-btn">
                <img src="../imagens/translate-icon.png" alt="🔥" style="width:18px;">
                Despertar Núcleos Brancos
            </button>
        </div>

        <div class="character-container">
            <div class="white-core" style="--mx: -220px; --my: -120px;"></div><div class="white-core" style="--mx: 220px; --my: -120px;"></div>
            <div class="white-core" style="--mx: -160px; --my: 130px;"></div><div class="white-core" style="--mx: 160px; --my: 130px;"></div>
            <div class="white-core" style="--mx: 0px; --my: -150px;"></div><div class="white-core" style="--mx: 0px; --my: 150px;"></div>

            <img src="../imagens/Nephis.jpg" alt="Nephis" class="character-img">
            
            <div class="nephis-rune-text" id="nephis-soul-core">
                <p>Nome Verdadeiro: Estrela da Mudança</p>
                <p>Nome: Nephis</p>
                <p>Rank: Adormecida</p>
                <p>Classe: Monstro</p>
                <p>Atributos: [Chama da Destruição], [Estrela da Ruína], [Inextinguível]</p>
            </div>
        </div>

        <div class="back-btn-container">
            <a href="../index.html" class="back-btn">← Retornar à Base</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('ambient-canvas'); const ctx = canvas.getContext('2d');
        let sparks = []; function resCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resCanvas); resCanvas();
        class Spark { constructor() { this.x = Math.random()*canvas.width; this.y = canvas.height+10; this.size = Math.random()*2+1; this.speedY = Math.random()*-2.5 - 0.5; } update() { this.y += this.speedY; } draw() { ctx.fillStyle="#fff"; ctx.shadowBlur=5; ctx.shadowColor="#fff"; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); } }
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); if(sparks.length<30) sparks.push(new Spark()); sparks.forEach((s,i)=>{ s.update(); s.draw(); if(s.y<-10) sparks.splice(i,1); }); requestAnimationFrame(anim); } anim();

        const runes = ['ᚦ', 'ᚧ', 'ᚨ', 'ᛒ', 'ᛃ', 'ᛄ', 'ᛅ'];
        const container = document.getElementById('nephis-soul-core');
        let cCount = 0;
        container.querySelectorAll('p').forEach(p => {
            const txt = p.textContent; p.textContent = '';
            for (let i = 0; i < txt.length; i++) {
                const span = document.createElement('span'); span.classList.add('nephis-letter');
                span.style.setProperty('--char-index', cCount++); span.dataset.real = txt[i];
                span.textContent = txt[i] === ' ' ? ' ' : runes[Math.floor(Math.random() * runes.length)];
                p.appendChild(span);
            }
        });

        function triggerExplosion(x,y){
            document.body.classList.remove('screen-shake'); void document.body.offsetWidth; document.body.classList.add('screen-shake');
            for(let i=0;i<5;i++){
                const s = document.createElement('div'); s.classList.add('fire-spark');
                s.style.width='4px'; s.style.height='4px'; s.style.left=x+'px'; s.style.top=y+'px';
                const angle = Math.random()*Math.PI*2; const vel = Math.random()*5+2;
                let cX=x, cY=y, op=1; document.body.appendChild(s);
                const m = setInterval(()=>{ cX+=Math.cos(angle)*vel; cY+=Math.sin(angle)*vel; op-=0.06; s.style.left=cX+'px'; s.style.top=cY+'px'; s.style.opacity=op; if(op<=0){clearInterval(m);s.remove();} },20);
            }
        }
        function shatterLetter(l){
            if(l.textContent===' ' || l.classList.contains('revealed') || l.classList.contains('shattering')) return;
            l.classList.add('shattering'); const r = l.getBoundingClientRect();
            triggerExplosion(r.left+r.width/2+window.scrollX, r.top+r.height/2+window.scrollY);
            setTimeout(()=>{ l.classList.remove('shattering'); l.textContent=l.dataset.real; l.classList.add('revealed'); }, 150);
        }
        container.querySelectorAll('.nephis-letter').forEach(l=>{ l.addEventListener('mouseenter', ()=>shatterLetter(l)); });

        document.getElementById('mass-btn').addEventListener('click', () => {
            document.querySelectorAll('.white-core').forEach(c => c.style.animation = 'coreGather 1.2s forwards ease-in-out');
            setTimeout(() => {
                document.body.classList.add('screen-shake'); document.body.classList.add('burned-borders');
                container.querySelectorAll('.nephis-letter').forEach(l => { l.textContent = l.dataset.real; l.classList.add('revealed'); });
                setTimeout(() => document.body.classList.remove('screen-shake'), 300);
            }, 1200);
        });
    </script>
</body>
</html>
