<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alma - Nephis</title>
    <link rel="stylesheet" href="../css/style.css?v=8">
    
    <style>
        body { 
            background-color: #060606 !important; 
            overflow-x: hidden; position: relative; margin: 0; padding: 0;
            transition: transform 0.1s ease;
        }

        /* --- BOTÃO DE TRADUÇÃO EM MASSA --- */
        .mass-translate-container { display: flex; justify-content: center; margin-bottom: 25px; }
        .mass-translate-btn {
            background: #111; border: 1px solid #333; padding: 10px 20px; border-radius: 4px;
            color: #aaa; font-family: monospace; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }
        .mass-translate-btn:hover { border-color: #fff; color: #fff; }

        .character-container {
            display: flex; gap: 25px; background: rgba(10, 10, 10, 0.95);
            border: 1px solid #222; padding: 25px; border-radius: 4px; align-items: center;
            position: relative; transition: all 0.5s ease;
        }

        /* Bordas chamuscadas com fogo branco disparadas após a explosão */
        body.burned-borders .character-container {
            border-color: #ffffff !important;
            box-shadow: 0 0 35px rgba(255, 255, 255, 0.3), inset 0 0 20px rgba(255,255,255,0.1);
            background: radial-gradient(circle at center, #0a0a0a 60%, #1c1c1c 100%);
        }

        .nephis-letter { display: inline-block; font-family: serif; color: #333; transition: all 0.3s; }
        .nephis-letter.revealed { color: #ffffff !important; text-shadow: 0 0 8px rgba(255, 255, 255, 0.6) !important; }

        /* --- VISUAL DOS SEIS NÚCLEOS BRANCOS --- */
        .white-core {
            position: absolute; width: 12px; height: 12px; background: #fff;
            border-radius: 50%; box-shadow: 0 0 20px #fff, 0 0 40px #fff;
            opacity: 0; pointer-events: none; z-index: 30;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        @keyframes coreGather {
            0% { opacity: 1; transform: translate(var(--mx), var(--my)) scale(1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); filter: blur(0px); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(0); filter: blur(5px); }
        }

        .screen-shake { animation: shake 0.3s linear; }
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-6px, 4px); }
            50% { transform: translate(6px, -4px); }
            75% { transform: translate(-3px, -2px); }
        }
    </style>
</head>
<body>

    <div class="content-wrapper" style="max-width: 750px; margin: 0 auto; padding: 5vh 20px;">
        <div class="mass-translate-container">
            <button class="mass-translate-btn" id="mass-btn">
                <img src="../img/nephischibi.jpg" alt="🔥" style="width:18px;" class="mass-translate-icon">
                Ativar Chamas da Alma
            </button>
        </div>

        <div class="character-container" id="card">
            <div class="white-core" style="--mx: -200px; --my: -100px;"></div>
            <div class="white-core" style="--mx: 200px; --my: -100px;"></div>
            <div class="white-core" style="--mx: -150px; --my: 120px;"></div>
            <div class="white-core" style="--mx: 150px; --my: 120px;"></div>
            <div class="white-core" style="--mx: 0px; --my: -140px;"></div>
            <div class="white-core" style="--mx: 0px; --my: 140px;"></div>

            <img src="../imagens/Nephis.jpg" alt="Nephis" style="width:180px;" class="character-img">
            
            <div class="nephis-rune-text" id="nephis-soul-core">
                <p>Nome Verdadeiro: Estrela da Mudança</p>
                <p>Nome: Nephis</p>
                <p>Rank: Adormecida</p>
                <p>Classe: Monstro</p>
                <p>Atributos: [Chama da Destruição], [Estrela da Ruína], [Inextinguível]</p>
            </div>
        </div>
    </div>

    <script>
        const runes = ['ᚦ', 'ᚧ', 'ᚨ', 'ᛒ', 'ᛃ', 'ᛄ', 'ᛅ'];
        const container = document.getElementById('nephis-soul-core');
        const paragraphs = container.querySelectorAll('p');

        paragraphs.forEach(p => {
            const originalText = p.textContent; p.textContent = '';
            for (let i = 0; i < originalText.length; i++) {
                const span = document.createElement('span'); 
                span.classList.add('nephis-letter');
                span.dataset.real = originalText[i];
                span.textContent = originalText[i] === ' ' ? ' ' : runes[Math.floor(Math.random() * runes.length)];
                p.appendChild(span);
            }
        });

        document.getElementById('mass-btn').addEventListener('click', () => {
            const cores = document.querySelectorAll('.white-core');
            cores.forEach(c => {
                c.style.animation = 'coreGather 1.2s forwards cubic-bezier(0.25, 1, 0.5, 1)';
            });

            setTimeout(() => {
                // Explosão e tremor de tela
                document.body.classList.add('screen-shake');
                document.body.classList.add('burned-borders');
                
                container.querySelectorAll('.nephis-letter').forEach(l => {
                    l.textContent = l.dataset.real;
                    l.classList.add('revealed');
                });

                setTimeout(() => document.body.classList.remove('screen-shake'), 300);
            }, 1200);
        });
    </script>
</body>
</html>
